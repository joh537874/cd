<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>화폐 진화 단일 앱</title>
  <style>
    :root {
      --bg: #111111;
      --text: rgba(242, 242, 242, 0.94);
      --muted: rgba(176, 176, 176, 0.56);
      --line: rgba(255, 255, 255, 0.18);
      --gold: rgb(232, 232, 232);
      --mono: "Courier New", Courier, monospace;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: var(--bg);
      color: var(--text);
      font-family: var(--mono);
    }

    body {
      background:
        radial-gradient(ellipse at 50% 0%, rgba(80,80,80,0.18) 0%, transparent 55%),
        #121212;
    }

    #video {
      display: none;
    }

    #webcam-layer {
      display: none;
    }

    #webcam-preview {
      position: fixed;
      right: 18px;
      top: 18px;
      width: 160px;
      height: 120px;
      z-index: 6;
      border: 1px solid rgba(255, 255, 255, 0.6);
      filter: saturate(0.2) contrast(1.1);
      pointer-events: none;
      opacity: 0;
    }

    #scene-layer {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 2;
    }

    #viewport {
      position: fixed;
      inset: 0;
      z-index: 3;
      overflow-y: auto;
      scroll-snap-type: y mandatory;
      scroll-behavior: smooth;
    }

    #viewport {
      -ms-overflow-style: none; /* IE and Edge */
      scrollbar-width: none; /* Firefox */
    }
    #viewport::-webkit-scrollbar {
      display: none; /* Chrome, Safari, Opera*/
    }

    .stage {
      position: relative;
      min-height: 100vh;
      scroll-snap-align: start;
    }

    #hud {
      position: fixed;
      inset: 0;
      z-index: 5;
      pointer-events: none;
    }

    #panel {
      position: fixed;
      left: 40px;
      top: 40px;
      border: 1px solid rgba(255, 255, 255, 0.7);
      padding: 6px 12px;
      pointer-events: none;
      display: flex;
      align-items: baseline;
      gap: 0;
    }

    #panel-label {
      color: var(--text);
      font-family: var(--mono);
      font-size: 15px;
      font-weight: 400;
      letter-spacing: 0.04em;
    }

    #panel-value {
      color: var(--text);
      font-family: var(--mono);
      font-size: 15px;
      font-weight: 400;
      letter-spacing: 0.04em;
      opacity: 1;
      transform: none;
    }

    #dock {
      position: fixed;
      right: 18px;
      top: 50%;
      bottom: auto;
      transform: translateY(-50%);
      z-index: 6;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
      padding: 0;
    }

    .dot {
      width: 10px;
      height: 10px;
      border-radius: 0;
      border: 0;
      background: rgba(255,255,255,0.22);
      cursor: pointer;
      transition: transform 160ms ease, background-color 160ms ease;
    }

    .dot.active {
      background: rgba(255,255,255,0.85);
      transform: scale(1.3);
    }

    #stage-title {
      display: none;
    }

    #stage-text {
      position: fixed;
      left: 40px;
      top: 50%;
      transform: translateY(-50%);
      z-index: 6;
      max-width: 300px;
      pointer-events: none; 
    }

    .stage-q {
      font-family: var(--mono);
      font-size: 12px;
      font-weight: 400;
      letter-spacing: 0.04em;
      color: rgba(200, 200, 200, 0.7);
      margin-bottom: 16px;
    }

    .stage-name {
      font-family: var(--mono);
      font-size: 14px;
      font-weight: 700;
      letter-spacing: 0.04em;
      color: var(--text);
      margin-bottom: 12px;
    }

    .stage-desc {
      font-family: var(--mono);
      font-size: 10px;
      font-weight: 400;
      line-height: 1.4;
      color: rgba(255, 255, 255, 0.7);
      margin-bottom: 8px;
      white-space: pre-line;
    }

    .dud {
      color: rgba(165, 165, 165, 0.52);
    }

    #stage-text.is-intro {
      left: 50%;
      top: 50%;
      transform: translate(-50%, -50%);
      text-align: center;
      max-width: 90vw;
    }

    #stage-text.is-intro .stage-q {
      color: #ffffff;
      opacity: 1;
      font-size: 24px;
    }

    #stage-text.is-intro .stage-name,
    #stage-text.is-intro .stage-desc {
      display: none;
    }

    @media (max-width: 720px) {
      #stage-text {
        left: 16px;
        max-width: 260px;
      }
      #stage-text .stage-q,
      #stage-text .stage-name {
        font-size: 12px;
      }
      #stage-text .stage-desc {
        font-size: 12px;
      }
      #webcam-preview {
        width: 100px;
        height: 75px;
        right: 12px;
        top: 12px;
      }
      #panel {
        left: 12px;
        top: 12px;
        font-size: 14px;
      }
      #panel-label, #panel-value {
        font-size: 14px;
      }
      #dock {
        right: 12px;
      }
    }

    #stage4-overlay {
      position: fixed;
      inset: 0;
      z-index: 1;
      pointer-events: none;
      overflow: hidden;
      opacity: 0;
      transition: opacity 420ms ease;
    }

    #stage4-overlay img {
      position: absolute;
    }

    #stage4-overlay.active {
      opacity: 1;
    }

    #panel.inverted {
      background: #ffffff;
      border-color: rgba(255, 255, 255, 0.9);
    }

    #panel.inverted #panel-label,
    #panel.inverted #panel-value {
      color: #000000;
    }
  </style>
</head>
<body>
  <video id="video" playsinline autoplay muted></video>
  <canvas id="webcam-layer"></canvas>
  <canvas id="scene-layer"></canvas>
  <canvas id="webcam-preview"></canvas>

  <div id="viewport">
    <section class="stage" data-index="0"></section>
    <section class="stage" data-index="1"></section>
    <section class="stage" data-index="2"></section>
    <section class="stage" data-index="3"></section>
    <section class="stage" data-index="4"></section>
  </div>

  <div id="hud">
    <div id="panel">
      <span id="panel-label">Cost&nbsp;&nbsp;:&nbsp;</span><span id="panel-value">0000$</span>
    </div>
  </div>

  <!-- Stage 4 Overlay (Step4_2 design) -->
  <div id="stage4-overlay">
    <!-- 배경 요소가 모두 제거되었습니다. -->
  </div>

  <div id="dock"></div>
  <div id="stage-title">Shell Currency</div>

  <div id="stage-text">
    <div class="stage-q">HOW IS IT MONEY?</div>
    <h2 class="stage-name">SHELL</h2>
    <p class="stage-desc">Shells were mainly used for barter.<br>But then again, what you receive in<br>return may not be money either.</p>
    <p class="stage-desc">Isn't it heavy to carry?<br>Be careful not to drop your shells.<br>You may not get as many goods as you want.</p>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/matter-js/0.19.0/matter.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/face_mesh.js" crossorigin="anonymous"></script>

  <script>
    const video = document.getElementById("video");
    const webcamCanvas = document.getElementById("webcam-layer");
    const sceneCanvas = document.getElementById("scene-layer");
    const previewCanvas = document.getElementById("webcam-preview");
    const sceneCtx = sceneCanvas.getContext("2d");
    const previewCtx = previewCanvas.getContext("2d");
    const viewport = document.getElementById("viewport");
    const stages = [...document.querySelectorAll(".stage")];
    const dock = document.getElementById("dock");
    const panelValueEl = document.getElementById("panel-value");
    const { Engine, World, Bodies, Body } = Matter;

    let width = window.innerWidth;
    let height = window.innerHeight;
    let activeStage = 0;
    let videoReady = false;
    let handsBusy = false;
    let faceBusy = false;
    let lastVisionTs = 0;

    const stageTexts = [
      {
        q: "HOW IS IT MONEY?",
        name: "",
        descs: []
      },
      {
        q: "HOW IS IT MONEY?",
        name: "SHELL",
        descs: [
          "Shells were mainly used for barter.\nBut then again, what you receive in\nreturn may not be money either.",
          "Isn't it heavy to carry?\nBe careful not to drop your shells.\nYou may not get as many goods as you want."
        ]
      },
      {
        q: "HOW IS IT MONEY?",
        name: "STANDARDIZED MONEY",
        descs: [
          "Coins and bills gave value a fixed form.\nStandardization made trade easier\nacross different regions and people.",
          "Count it, store it, spend it.\nBut what happens when the paper\nis worth more than what backs it?"
        ]
      },
      {
        q: "HOW IS IT MONEY?",
        name: "DIGITAL TRANSFER",
        descs: [
          "Money became a signal. Numbers\nflowing through wires, invisible\nyet universally accepted.",
          "Touch to send. Tap to receive.\nThe physical bill is now a memory\nof a slower, heavier world."
        ]
      },
      {
        q: "HOW IS IT MONEY?",
        name: "VIRTUAL ASSET",
        descs: [
          "Decentralized, encrypted, scarce.\nNo government backs it.\nConsensus is its only authority.",
          "Blink and the value shifts.\nIs it money, or a bet on what\nmoney might become?"
        ]
      }
    ];

    const stageTextEl = document.getElementById("stage-text");
    const stage4OverlayEl = document.getElementById("stage4-overlay");
    const transitionCanvas = document.createElement("canvas");
    const transitionCtx = transitionCanvas.getContext("2d", { willReadFrequently: true });
    const transitionTargetCanvas = document.createElement("canvas");
    const transitionTargetCtx = transitionTargetCanvas.getContext("2d", { willReadFrequently: true });
    const textScrambleChars = "!<>-_\\/[]{}=+*^?#________";
    let stageTextRun = 0;
    const stageTransition = {
      active: false,
      fromIndex: 0,
      toIndex: 0,
      startedAt: 0,
      duration: 1280,
      particles: []
    };

    function clamp01(v) {
      return Math.max(0, Math.min(1, v));
    }

    function easeInOutCubic(t) {
      return t < 0.5 ? 4 * t * t * t : 1 - Math.pow(-2 * t + 2, 3) / 2;
    }

    function randomScrambleChar() {
      return textScrambleChars[Math.floor(Math.random() * textScrambleChars.length)];
    }

    function wait(ms) {
      return new Promise((resolve) => setTimeout(resolve, ms));
    }

    function scrambleText(el, nextText, runId) {
      const previousText = el.textContent || "";
      const length = Math.max(previousText.length, nextText.length);
      const queue = [];
      for (let i = 0; i < length; i++) {
        queue.push({
          from: previousText[i] || "",
          to: nextText[i] || "",
          start: Math.floor(Math.random() * 24),
          end: 28 + Math.floor(Math.random() * 28),
          char: ""
        });
      }
      let frame = 0;
      return new Promise((resolve) => {
        function update() {
          if (runId !== stageTextRun) {
            resolve();
            return;
          }
          let output = "";
          let done = 0;
          for (const item of queue) {
            if (frame >= item.end) {
              done += 1;
              output += item.to;
            } else if (frame >= item.start) {
              if (!item.char || Math.random() < 0.28) item.char = randomScrambleChar();
              output += `<span class="dud">${item.char}</span>`;
            } else {
              output += item.from;
            }
          }
          el.innerHTML = output;
          if (done === queue.length) {
            el.textContent = nextText;
            resolve();
            return;
          }
          frame += 1;
          requestAnimationFrame(update);
        }
        update();
      });
    }

    function mountStageText(index) {
      const t = stageTexts[index];
      stageTextEl.innerHTML = `
        <div class="stage-q"></div>
        <h2 class="stage-name"></h2>
        ${t.descs.map(() => `<p class="stage-desc"></p>`).join("")}
      `;
      return {
        qEl: stageTextEl.querySelector(".stage-q"),
        nameEl: stageTextEl.querySelector(".stage-name"),
        descEls: [...stageTextEl.querySelectorAll(".stage-desc")]
      };
    }

    function setStageText(index, immediate = false) {
      const t = stageTexts[index];
      const { qEl, nameEl, descEls } = mountStageText(index);
      if (immediate) {
        qEl.textContent = t.q;
        nameEl.textContent = t.name;
        descEls.forEach((el, i) => { el.innerHTML = t.descs[i].replace(/\n/g, "<br>"); });
        return;
      }
      const runId = ++stageTextRun;
      (async () => {
        await scrambleText(qEl, t.q, runId);
        if (runId !== stageTextRun) return;
        if (t.name && t.name.length > 0) {
          await wait(80);
          const titleJob = scrambleText(nameEl, t.name, runId);
          const descJobs = descEls.map((el, i) => (async () => {
            await wait(150 + i * 150);
            if (runId !== stageTextRun) return;
            await scrambleText(el, t.descs[i], runId);
            if (runId !== stageTextRun) return;
            el.innerHTML = t.descs[i].replace(/\n/g, "<br>");
          })());
          await Promise.all([titleJob, ...descJobs]);
        }
      })();
    }

    function renderStageByIndex(targetCtx, index) {
      targetCtx.save();
      targetCtx.setTransform(1, 0, 0, 1, 0, 0);
      targetCtx.clearRect(0, 0, width, height);
      if (index === 0) stage0.draw(targetCtx);
      if (index === 1) stage1.draw(targetCtx);
      if (index === 2) stage2.draw(targetCtx);
      if (index === 3) stage3.draw(targetCtx);
      if (index === 4) stage4.draw(targetCtx);
      targetCtx.restore();
    }

    function createFallbackPoint(mode, i, total) {
      const ratio = i / Math.max(1, total - 1);
      const angle = ratio * Math.PI * 2;
      if (mode === "center") {
        return {
          x: width * 0.5 + Math.cos(angle) * width * 0.06,
          y: height * 0.5 + Math.sin(angle) * height * 0.06,
          alpha: 0.45,
          size: 1.2
        };
      }
      return {
        x: Math.random() * width,
        y: Math.random() * height,
        alpha: 0.18 + Math.random() * 0.26,
        size: 0.8 + Math.random() * 1.4
      };
    }

    function buildStageFieldPoints(index, count) {
      const points = [];
      for (let i = 0; i < count; i++) {
        const ratio = i / Math.max(1, count - 1);
        const angle = ratio * Math.PI * 2;
        if (index === 0) {
          const ring = 40 + (i % 12) * 8 + Math.random() * 18;
          points.push({
            x: width * 0.5 + Math.cos(angle + i * 0.16) * ring,
            y: height * 0.72 + Math.sin(angle * 1.2) * ring * 0.32 + (Math.random() - 0.5) * 36,
            alpha: 0.22 + Math.random() * 0.22,
            size: 1 + Math.random() * 1.8
          });
          continue;
        }
        if (index === 1) {
          points.push({
            x: width * 0.26 + (i % 12) * (width * 0.04) + (Math.random() - 0.5) * 14,
            y: height * 0.74 + Math.floor(i / 12) * 18 + (Math.random() - 0.5) * 10,
            alpha: 0.2 + Math.random() * 0.2,
            size: 1 + Math.random() * 1.6
          });
          continue;
        }
        if (index === 2) {
          points.push({
            x: width * (0.26 + ((i % 10) / 9) * 0.48) + (Math.random() - 0.5) * 18,
            y: height * (0.24 + ratio * 0.45) + Math.sin(angle * 3) * 16,
            alpha: 0.18 + Math.random() * 0.2,
            size: 0.9 + Math.random() * 1.4
          });
          continue;
        }
        points.push({
          x: width * 0.5 + Math.cos(angle) * (36 + (i % 10) * 8) + (Math.random() - 0.5) * 12,
          y: height * 0.5 + Math.sin(angle * 1.1) * (30 + (i % 8) * 10) + (Math.random() - 0.5) * 12,
          alpha: 0.2 + Math.random() * 0.24,
          size: 0.9 + Math.random() * 1.6
        });
      }
      return points;
    }

    function buildTransitionParticles(fromIndex, toIndex) {
      const count = 110;
      const fromPoints = buildStageFieldPoints(fromIndex, count);
      const toPoints = buildStageFieldPoints(toIndex, count);
      const particles = [];
      for (let i = 0; i < count; i++) {
        const source = fromPoints[i] || createFallbackPoint("scatter", i, count);
        const target = toPoints[i] || createFallbackPoint("center", i, count);
        const typeRoll = Math.random();
        particles.push({
          x: source.x,
          y: source.y,
          tx: target.x,
          ty: target.y,
          vx: (Math.random() - 0.5) * 4,
          vy: (Math.random() - 0.5) * 4,
          size: Math.max(source.size || 1, target.size || 1),
          alpha: Math.max(source.alpha || 0.18, target.alpha || 0.18),
          type: typeRoll < 0.1 ? "cross" : (typeRoll < 0.16 ? "dash" : "dot"),
          angle: Math.random() * Math.PI,
          delay: Math.floor(Math.random() * 20)
        });
      }
      return particles;
    }

    function beginStageMorph(fromIndex, toIndex) {
      transitionCanvas.width = width;
      transitionCanvas.height = height;
      transitionTargetCanvas.width = width;
      transitionTargetCanvas.height = height;
      renderStageByIndex(transitionCtx, fromIndex);
      renderStageByIndex(transitionTargetCtx, toIndex);
      stageTransition.active = true;
      stageTransition.fromIndex = fromIndex;
      stageTransition.toIndex = toIndex;
      stageTransition.startedAt = performance.now();
      stageTransition.particles = buildTransitionParticles(fromIndex, toIndex);
    }

    function drawTransitionParticle(ctx, particle) {
      const alpha = clamp01(particle.alpha);
      if (alpha < 0.02) return;
      ctx.strokeStyle = `rgba(255,255,255,${alpha.toFixed(3)})`;
      ctx.fillStyle = `rgba(255,255,255,${alpha.toFixed(3)})`;
      if (particle.type === "cross") {
        const s = particle.size * 2.2;
        ctx.lineWidth = 0.7;
        ctx.beginPath();
        ctx.moveTo(particle.x - s, particle.y);
        ctx.lineTo(particle.x + s, particle.y);
        ctx.moveTo(particle.x, particle.y - s);
        ctx.lineTo(particle.x, particle.y + s);
        ctx.stroke();
        return;
      }
      if (particle.type === "dash") {
        const s = particle.size * 2.8;
        const ca = Math.cos(particle.angle);
        const sa = Math.sin(particle.angle);
        ctx.lineWidth = 0.75;
        ctx.beginPath();
        ctx.moveTo(particle.x - ca * s, particle.y - sa * s);
        ctx.lineTo(particle.x + ca * s, particle.y + sa * s);
        ctx.stroke();
        return;
      }
      ctx.beginPath();
      ctx.arc(particle.x, particle.y, particle.size, 0, Math.PI * 2);
      ctx.fill();
    }

    function drawStageMorph(ctx, ts) {
      if (!stageTransition.active) return;
      const elapsed = ts - stageTransition.startedAt;
      const t = clamp01(elapsed / stageTransition.duration);
      const fadePrev = 1 - easeInOutCubic(clamp01(elapsed / 620));
      const fadeNext = easeInOutCubic(clamp01((elapsed - 120) / 920));
      let movingCount = 0;

      ctx.save();
      ctx.globalAlpha = fadeNext;
      ctx.drawImage(transitionTargetCanvas, 0, 0, width, height);
      ctx.restore();

      if (fadePrev > 0) {
        ctx.save();
        ctx.globalAlpha = fadePrev * 0.92;
        ctx.drawImage(transitionCanvas, 0, 0, width, height);
        ctx.restore();
      }

      ctx.save();
      ctx.fillStyle = `rgba(0,0,0,${(0.16 * (1 - fadeNext)).toFixed(3)})`;
      ctx.fillRect(0, 0, width, height);
      ctx.restore();

      ctx.save();
      ctx.globalCompositeOperation = "lighter";
      for (const particle of stageTransition.particles) {
        if (particle.delay > 0) {
          particle.delay -= 1;
          drawTransitionParticle(ctx, particle);
          movingCount += 1;
          continue;
        }
        particle.vx += (particle.tx - particle.x) * 0.024;
        particle.vy += (particle.ty - particle.y) * 0.024;
        particle.vx *= 0.86;
        particle.vy *= 0.86;
        particle.x += particle.vx;
        particle.y += particle.vy;
        particle.alpha *= 0.997;
        drawTransitionParticle(ctx, particle);
        const dist = Math.hypot(particle.tx - particle.x, particle.ty - particle.y);
        const speed = Math.hypot(particle.vx, particle.vy);
        if (dist > 1.2 || speed > 0.12) movingCount += 1;
      }
      ctx.restore();

      if (t >= 1 && movingCount < stageTransition.particles.length * 0.12) {
        stageTransition.active = false;
        stageTransition.particles.length = 0;
      }
    }

    function formatCost(n) {
      const s = String(n);
      const padded = s.padStart(4, "0");
      return padded + "$";
    }

    const panelEl = document.getElementById("panel");
    let panelInvertTimer = null;
    let hudPulse = 0;

    function updateHud(animate = true) {
      let val = 0;
      if (activeStage === 1) val = stage1.count;
      if (activeStage === 2) val = stage2.count;
      if (activeStage === 3) val = stage3.total;
      if (activeStage === 4) val = stage4.activity;
      const newText = formatCost(val);
      if (newText !== panelValueEl.textContent) {
        panelEl.classList.add("inverted");
        clearTimeout(panelInvertTimer);
        panelInvertTimer = setTimeout(() => panelEl.classList.remove("inverted"), 350);
        hudPulse = 1;
      }
      panelValueEl.textContent = newText;
    }

    stages.forEach((stage, index) => {
      const dot = document.createElement("button");
      dot.className = "dot";
      dot.type = "button";
      dot.addEventListener("click", () => {
        goToStage(index);
      });
      dock.appendChild(dot);
      stage._dot = dot;
    });

    function goToStage(index, { immediate = false, syncScroll = true } = {}) {
      const nextIndex = clamp(index, 0, stages.length - 1);
      activateStage(nextIndex, { immediate });
      if (syncScroll) {
        viewport.scrollTo({ top: nextIndex * height, behavior: immediate ? "auto" : "smooth" });
      }
    }

    function activateStage(index, { immediate = false } = {}) {
      if (index === activeStage && !immediate) return;
      const previousStage = activeStage;
      if (!immediate) beginStageMorph(previousStage, index);
      activeStage = index;
      stages.forEach((stage, i) => stage._dot.classList.toggle("active", i === index));
      panelEl.style.display = index === 0 ? 'none' : 'flex';
      updateHud(false);
      stage1.hand.visible = false;
      stage2.pinch.visible = false;
      stage3.fingertips.forEach((s) => s.visible = false);
      stage4.blink.visible = false;
      stage4OverlayEl.classList.toggle("active", index === 4);
      stageTextEl.classList.toggle('is-intro', index === 0);
      if (immediate) {
        setStageText(index, true);
      } else {
        const transitionStartedAt = stageTransition.startedAt;
        setTimeout(() => {
          if (stageTransition.startedAt !== transitionStartedAt) return;
          setStageText(index, false);
        }, 180);
      }
    }

    const observer = new IntersectionObserver((entries) => {
      let best = null;
      for (const entry of entries) {
        if (!best || entry.intersectionRatio > best.intersectionRatio) best = entry;
      }
      if (!best || best.intersectionRatio < 0.55) return;
      activateStage(Number(best.target.dataset.index));
    }, { root: viewport, threshold: [0.25, 0.55, 0.75] });
    stages.forEach((stage) => observer.observe(stage));

    let scrollStageRaf = 0;
    function syncStageWithScroll() {
      scrollStageRaf = 0;
      const nextIndex = clamp(Math.round(viewport.scrollTop / Math.max(1, height)), 0, stages.length - 1);
      activateStage(nextIndex);
    }
    viewport.addEventListener("scroll", () => {
      if (scrollStageRaf) cancelAnimationFrame(scrollStageRaf);
      scrollStageRaf = requestAnimationFrame(syncStageWithScroll);
    }, { passive: true });

      const isNextKey = event.key === "ArrowRight" || event.key === ">" || event.key === ".";
      const isPrevKey = event.key === "ArrowLeft" || event.key === "<" || event.key === ",";
      if (!isNextKey && !isPrevKey) return;
      event.preventDefault();
      if (isNextKey) goToStage(activeStage + 1);
      if (isPrevKey) goToStage(activeStage - 1);
    });

    const stage1 = {
      shells: [],
      handTrail: [],
      count: 0,
      gateY: -40,
      suctionY: 420,
      grabRadius: 150,
      targetX: 0,
      targetY: 0,
      hand: { visible: false, fist: false, point: { x: width / 2, y: height / 2 }, velocity: { x: 0, y: 0 }, landmarks: null },
      resize(prevWidth = width, prevHeight = height) {
        this.bounds = { w: width, h: height };
        this.targetX = width / 2;
        this.targetY = 24;
        if (!this.shells.length) {
          this.init();
          return;
        }
        const safePrevWidth = Math.max(prevWidth, 1);
        const safePrevHeight = Math.max(prevHeight, 1);
        for (const shell of this.shells) {
          shell.restX = clamp((shell.restX / safePrevWidth) * width, 80, width - 80);
          shell.x = clamp((shell.x / safePrevWidth) * width, 70, width - 70);
          shell.restY = clamp(height - (safePrevHeight - shell.restY), 80, height - 80);
          shell.y = clamp(height - (safePrevHeight - shell.y), -120, height - 40);
        }
      },
      init() {
        this.shells = [];
        for (let i = 0; i < 28; i++) {
          this.shells.push({
            x: 80 + Math.random() * (width - 160),
            y: height - 140 - Math.random() * 160,
            vx: 0, vy: 0,
            size: 60 + Math.random() * 36,
            img: sharedShellSprites[i % sharedShellSprites.length],
            orbitSeed: Math.random() * Math.PI * 2,
            restX: 80 + Math.random() * (width - 160),
            restY: height - 140 - Math.random() * 160,
            spent: false
          });
        }
      },
      update() {
        const driftNow = performance.now();
        this.handTrail = this.hand.fist
          ? [{ x: this.hand.point.x, y: this.hand.point.y, vx: this.hand.velocity.x, vy: this.hand.velocity.y }, ...this.handTrail].slice(0, 36)
          : this.handTrail.slice(0, Math.max(0, this.handTrail.length - 1));
        for (let i = 0; i < this.shells.length; i++) {
          const shell = this.shells[i];
          if (shell.spent) continue;
          const handDist = Math.hypot(shell.x - this.hand.point.x, shell.y - this.hand.point.y);
          const liftingNow = this.hand.velocity.y < -1.4;
          const activeGrabRadius = liftingNow ? this.grabRadius * 2.1 : this.grabRadius;
          if (this.hand.fist && this.handTrail.length && handDist < activeGrabRadius) {
            const t = this.handTrail[Math.min(this.handTrail.length - 1, 4 + (i % 6) * 2)];
            const angle = shell.orbitSeed + i * 0.52;
            const radius = 58 * (0.5 + (i % 4) * 0.18);
            const target = { x: t.x + Math.cos(angle) * radius, y: t.y + Math.sin(angle) * radius * 0.76 };
            const lifting = liftingNow || t.vy < -1.4;
            const catchStrength = lifting ? 0.0038 : 0.0012;
            const velocityBlend = lifting ? 0.0032 : 0.0011;
            shell.vx += (target.x - shell.x) * catchStrength + t.vx * velocityBlend;
            shell.vy += (target.y - shell.y) * catchStrength + t.vy * velocityBlend;
          } else {
            shell.vx += (shell.restX - shell.x) * 0.0018 + Math.sin((driftNow * 0.0012) + shell.orbitSeed) * 0.008;
            shell.vy += (shell.restY - shell.y) * 0.0024 + Math.cos((driftNow * 0.0014) + shell.orbitSeed) * 0.006;
          }
          if (shell.y < this.suctionY) {
            const pull = Math.pow(1 - clamp(shell.y / this.suctionY, 0, 1), 0.6);
            shell.vy -= 4.2 * pull;
            shell.vx += (this.targetX - shell.x) * 0.032 * pull;
          }
          shell.vx *= 0.9;
          shell.vy *= 0.9;
          shell.x = clamp(shell.x + shell.vx, 70, width - 70);
          shell.y += shell.vy;
          if (shell.y < this.gateY) {
            this.count += 1;
            updateHud();
            shell.spent = true;
          }
          shell.y = clamp(shell.y, -120, height - 40);
        }
      },
      draw(ctx) {
        ctx.save();

        // Pass 1: glow only — drawn in absolute coords, no per-shell save/translate
        if (this.hand.visible && this.hand.fist) {
          const hx = this.hand.point.x, hy = this.hand.point.y;
          const grabR = this.grabRadius * 1.5;
          for (const shell of this.shells) {
            if (shell.spent) continue;
            const dx = shell.x - hx, dy = shell.y - hy;
            const gs = Math.max(0, 1 - (dx * dx + dy * dy) / (grabR * grabR));
            if (gs < 0.04) continue;
            const r = shell.size * 1.1;
            const grad = ctx.createRadialGradient(shell.x, shell.y, 0, shell.x, shell.y, r);
            grad.addColorStop(0, `rgba(255,255,255,${(0.2 * gs).toFixed(2)})`);
            grad.addColorStop(1, 'rgba(255,255,255,0)');
            ctx.fillStyle = grad;
            ctx.beginPath();
            ctx.arc(shell.x, shell.y, r, 0, Math.PI * 2);
            ctx.fill();

        // Pass 2: shell images — no translate needed, direct absolute draw
        ctx.globalAlpha = 0.9;
        for (const shell of this.shells) {
          if (shell.spent) continue;
          ctx.drawImage(shell.img,
            shell.x - shell.size * 0.62,
            shell.y - shell.size * 0.5,
            shell.size * 1.24,
            shell.size);
        }
        ctx.globalAlpha = 1;

        if (this.hand.visible && this.hand.landmarks) {
          const lm = this.hand.landmarks;
          // hand skeleton edges (MediaPipe Hands connections)
          const edges = [
            [0,1],[1,2],[2,3],[3,4],
            [0,5],[5,6],[6,7],[7,8],
            [0,9],[9,10],[10,11],[11,12],
            [0,13],[13,14],[14,15],[15,16],
            [0,17],[17,18],[18,19],[19,20],
            [5,9],[9,13],[13,17]
          ];
          const edgeAlpha = this.hand.fist ? 0.55 : 0.32;
          ctx.strokeStyle = `rgba(210,210,210,${edgeAlpha})`;
          ctx.lineWidth = 1;
          for (const [a, b] of edges) {
            ctx.beginPath();
            ctx.moveTo(lm[a].x, lm[a].y);
            ctx.lineTo(lm[b].x, lm[b].y);
            ctx.stroke();
          }
          const nodeAlpha = this.hand.fist ? 0.9 : 0.55;
          for (let i = 0; i < lm.length; i++) {
            const r = (i === 0) ? 5 : ([4,8,12,16,20].includes(i) ? 4 : 2.5);
            ctx.beginPath();
            ctx.arc(lm[i].x, lm[i].y, r, 0, Math.PI * 2);
            ctx.fillStyle = `rgba(230,230,230,${nodeAlpha})`;
            ctx.fill();
          }
        }

        ctx.restore();
      }
    };

    const stage2 = {
      engine: Engine.create({ gravity: { x: 0, y: 0.72 }, positionIterations: 12, velocityIterations: 10 }),
      notes: [],
      coins: [],
      particles: [],
      noteDrawOrder: [],
      count: 0,
      targetX: 0,
      targetY: 0,
      worldBodies: [],
      walletRect: { x: 0, y: 0, w: 0, h: 0 },
      counterRect: { x: 0, y: 0, w: 0, h: 0 },
      pinch: {

        active: false,
        mode: "single",
        closed: false,
        strength: 0,
        point: { x: width / 2, y: height / 2 },
        velocity: { x: 0, y: 0 }
      },
      hold: { item: null, kind: null, offset: { x: 0, y: 0 }, corner: null, startTs: 0, pullMax: 0 },
      resize() {
        this.targetX = width / 2;

        const walletW = Math.min(width * 0.76, 920);
        const walletH = Math.min(height * 0.29, 290);
        this.walletRect = {

        };

        };
        if (!this.notes.length && !this.coins.length) this.init();

      },
      init() {
        this.notes = [];
        this.coins = [];
        this.particles = [];
        const noteAssets = sharedMoneyAssets.filter((asset) => asset.type === "note");
        const coinAssets = sharedMoneyAssets.filter((asset) => asset.type === "coin");
        for (let stack = 0; stack < 3; stack++) {
          for (let depth = 0; depth < 2; depth++) {
            const asset = noteAssets[(stack + depth) % noteAssets.length];
            this.notes.push({
              ...asset,
              countValue: Number.parseInt(asset.value, 10),
              stack,
              depth,
              x: 0,
              y: 0,
              homeX: 0,
              homeY: 0,
              angle: (Math.random() - 0.5) * 0.03,
              vx: 0,
              vy: 0,
              angularVelocity: 0,
              peel: 0,
              detached: false,
              counted: false,
              flutter: 0,
              flutterPhase: Math.random() * Math.PI * 2,
              returnBlend: 0,
              restoring: false,
              shadowLift: 0,
              releaseAt: 0,
              driftPhase: Math.random() * Math.PI * 2,
              driftSpeed: 0.0008 + Math.random() * 0.0011,
              fadeOut: 0,
              fadeVY: 0
            });
          }
        }
        this.noteDrawOrder = [...this.notes].sort((a, b) => a.depth - b.depth || a.stack - b.stack);
        for (let i = 0; i < 6; i++) {
          const asset = coinAssets[i % coinAssets.length];
          const radius = asset.w * 0.3;
          const body = Bodies.circle(0, 0, radius, {
            restitution: 0.48 + (i % 2) * 0.08,
            friction: 0.025,
            frictionAir: 0.014,
            density: 0.0014,
            slop: 0.08
          });
          this.coins.push({
            ...asset,
            radius,
            countValue: Number.parseInt(asset.value, 10),
            body,
            counted: false,
            scoredAt: 0,
            spawnIndex: i,
            fadeOut: 0
          });
        }
      },
      buildWorld() {
        const world = this.engine.world;
        for (const body of this.worldBodies) World.remove(world, body);
        this.worldBodies = [];
        const wallThickness = 80;
        const bodies = [
          Bodies.rectangle(width / 2, height + wallThickness * 0.5, width + 200, wallThickness, { isStatic: true }),
          Bodies.rectangle(-wallThickness * 0.5, height / 2, wallThickness, height * 2, { isStatic: true }),
          Bodies.rectangle(width + wallThickness * 0.5, height / 2, wallThickness, height * 2, { isStatic: true })
        ];
        this.worldBodies.push(...bodies);
        World.add(world, bodies);
        for (const coin of this.coins) {
          if (!coin.body.world) World.add(world, coin.body);
        }
      },
      layoutWallet() {
        const stackGap = Math.min(this.walletRect.w * 0.24, 214);
        const baseX = this.walletRect.x + this.walletRect.w * 0.24;
        const baseY = this.walletRect.y + this.walletRect.h * 0.48;
        for (const note of this.notes) {
          const homeX = baseX + note.stack * stackGap + (Math.random() - 0.5) * 42 + note.depth * 10;
          const homeY = baseY + note.stack * 12 + note.depth * 18 + (Math.random() - 0.5) * 26;
          note.homeX = homeX;
          note.homeY = homeY;
          if (!note.detached && !note.restoring && this.hold.item !== note && !note.counted) {
            note.x = homeX;
            note.y = homeY;
            note.angle = (Math.random() - 0.5) * 0.08;
          }
        }
        const coinStartX = this.walletRect.x + this.walletRect.w * 0.66;
        const coinStartY = this.walletRect.y + this.walletRect.h * 0.44;
        this.coins.forEach((coin, index) => {
          coin.spawnX = coinStartX + (index % 3) * 78 + (Math.random() - 0.5) * 34;
          coin.spawnY = coinStartY + Math.floor(index / 3) * 72 + (Math.random() - 0.5) * 30;
          if (!coin.counted && this.hold.item !== coin) {
            Body.setPosition(coin.body, { x: coin.spawnX, y: coin.spawnY });
            Body.setVelocity(coin.body, { x: (Math.random() - 0.5) * 0.8, y: (Math.random() - 0.5) * 0.6 });
            Body.setAngle(coin.body, 0);
            Body.setAngularVelocity(coin.body, (Math.random() - 0.5) * 0.08);
          }
        });
      },
      topPickableNotes() {
        const topByStack = new Map();
        for (const note of this.notes) {
          if (note.counted) continue;
          const current = topByStack.get(note.stack);
          if (!current || note.depth > current.depth) topByStack.set(note.stack, note);
        }
        return [...topByStack.values()];
      },
      pickCandidate(point) {
        let best = null;
        let bestDist = 108;
        for (const note of this.topPickableNotes()) {
          const corners = [
            { x: note.x - note.w * 0.42, y: note.y - note.h * 0.33, corner: "left", weight: 0.86 },
            { x: note.x + note.w * 0.42, y: note.y - note.h * 0.33, corner: "right", weight: 0.86 },
            { x: note.x - note.w * 0.26, y: note.y - note.h * 0.22, corner: "left", weight: 1 },
            { x: note.x + note.w * 0.26, y: note.y - note.h * 0.22, corner: "right", weight: 1 },
            { x: note.x, y: note.y - note.h * 0.18, corner: Math.abs(point.x - note.x) < 1 ? "left" : (point.x < note.x ? "left" : "right"), weight: 1.08 }
          ];
          for (const c of corners) {
            const d = Math.hypot(c.x - point.x, c.y - point.y) * c.weight;
            if (d < bestDist) {
              best = { item: note, kind: "note", corner: c.corner };
              bestDist = d;
            }
          }
        }
        for (const coin of this.coins) {
          if (coin.counted) continue;
          const pos = coin.body.position;
          const d = Math.hypot(pos.x - point.x, pos.y - point.y);
          if (d < coin.radius * 0.75 && d < bestDist + 8) {
            best = { item: coin, kind: "coin", corner: null };
            bestDist = d;
          }
        }
        return best;
      },
      beginHold(candidate, ts) {
        this.hold.item = candidate.item;
        this.hold.kind = candidate.kind;
        this.hold.corner = candidate.corner;
        this.hold.startTs = ts;
        this.hold.pullMax = 0;
        if (candidate.kind === "note") {
          const note = candidate.item;
          note.detached = false;
          note.peel = 0;
          note.restoring = false;
          note.shadowLift = 0;
          note.fadeOut = 0;
          note.fadeVY = 0;
          note.grabCorner = candidate.corner;
          this.hold.offset = {
            x: note.x - this.pinch.point.x,
            y: note.y - this.pinch.point.y
          };
        } else {
          const pos = candidate.item.body.position;
          this.hold.offset = { x: pos.x - this.pinch.point.x, y: pos.y - this.pinch.point.y };
        }
      },
      releaseHold(ts) {
        if (!this.hold.item) return;
        const item = this.hold.item;
        if (this.hold.kind === "note") {
          const note = item;
          const deliberatePull = this.hold.pullMax > 118 && ts - this.hold.startTs > 180;
          if (note.detached && deliberatePull) {
            note.flutter = 1;
            note.releaseAt = ts;
            note.vx += this.pinch.velocity.x * 0.44;
            note.vy += this.pinch.velocity.y * 0.34;
            note.angularVelocity += (this.hold.corner === "left" ? -1 : 1) * 0.028;
          } else if (!note.counted) {
            note.restoring = true;
            note.returnBlend = 0;
            note.peel = Math.min(note.peel, 0.36);
          }
        } else {
          const coin = item;
          if (!coin.counted && pointInRect(coin.body.position, this.counterRect)) {
            this.scoreCoin(coin, ts);
          }
        }
        this.hold.item = null;
        this.hold.kind = null;
        this.hold.corner = null;
      },
      scoreNote(note) {
        if (note.counted) return;
        note.counted = true;
        this.spawnParticles(note.x, note.y);
        if (this.hold.item === note) {
          this.hold.item = null;
          this.hold.kind = null;
          this.hold.corner = null;
        }
        this.count += note.countValue;
        updateHud();
        note.restoring = false;
        note.returnBlend = 1;
        note.peel = 0;
        note.detached = false;
        note.flutter = 0;
        note.shadowLift = 0;
        note.vx = 0;
        note.vy = -2.6;
        note.fadeVY = -2.6 - Math.random() * 0.8;
        note.fadeOut = 1;
        note.grabCorner = null;
      },
      scoreCoin(coin, ts) {
        if (coin.counted) return;
        coin.counted = true;
        coin.scoredAt = ts;
        this.spawnParticles(coin.body.position.x, coin.body.position.y);
        coin.fadeOut = 1;
        this.count += coin.countValue;
        updateHud();
        Body.setVelocity(coin.body, {
          x: coin.body.velocity.x * 0.36 + this.pinch.velocity.x * 0.05,
          y: Math.min(-3.8, coin.body.velocity.y * 0.24 - 2.4)
        });
        Body.setAngularVelocity(coin.body, coin.body.angularVelocity + (Math.random() - 0.5) * 0.18);
      },
      spawnParticles(x, y) {
        const count = 15 + Math.floor(Math.random() * 10);
        for (let i = 0; i < count; i++) {
          const angle = Math.random() * Math.PI * 2;
          const speed = 1 + Math.random() * 4;
          this.particles.push({
            x, y,
            vx: Math.cos(angle) * speed,
            vy: Math.sin(angle) * speed - 2,
            life: 40 + Math.random() * 30,
            alpha: 0.6 + Math.random() * 0.4,
            size: 1 + Math.random() * 1.5
          });
        }
      },
      updateNote(note, ts) {
        const holding = this.hold.item === note && this.hold.kind === "note" && this.pinch.visible && this.pinch.closed;
        if (holding) {
          const pullVec = {
            x: this.pinch.point.x - note.homeX,
            y: this.pinch.point.y - note.homeY
          };
          const pullDist = Math.hypot(pullVec.x * 0.8, pullVec.y * 1.16);
          this.hold.pullMax = Math.max(this.hold.pullMax, pullDist);
          note.peel = clamp(pullDist / 116, 0, 1);
          note.shadowLift = note.peel;
          const deliberatePull = pullDist > 102 && ts - this.hold.startTs > 160;
          if (deliberatePull) note.detached = true;
          if (note.detached) {
            const targetX = this.pinch.point.x + this.hold.offset.x + (this.hold.corner === "left" ? note.w * 0.08 : -note.w * 0.08);
            const targetY = this.pinch.point.y + this.hold.offset.y;
            note.vx += (targetX - note.x) * 0.16 + this.pinch.velocity.x * 0.11;
            note.vy += (targetY - note.y) * 0.16 + this.pinch.velocity.y * 0.08;
            note.angle += (((this.hold.corner === "left" ? -0.17 : 0.17) + this.pinch.velocity.x * 0.0024) - note.angle) * 0.18;
          } else {
            const liftX = note.homeX + pullVec.x * 0.38;
            const liftY = note.homeY + pullVec.y * 0.24 - note.peel * 26;
            note.x += (liftX - note.x) * 0.24;
            note.y += (liftY - note.y) * 0.24;
            note.angle += (((this.hold.corner === "left" ? -0.08 : 0.08) * note.peel) - note.angle) * 0.16;
            note.vx *= 0.56;
            note.vy *= 0.56;
          }
        } else {
          if (note.counted) {
            note.fadeVY -= 0.08;
            note.y += note.fadeVY;
            note.fadeOut *= 0.9;
            note.shadowLift *= 0.78;
            note.peel *= 0.78;
            return;
          }
          if (note.flutter > 0.02) {
            const flutterWave = Math.sin((ts - note.releaseAt) * 0.035 + note.flutterPhase);
            note.vx *= 0.96;
            note.vy *= 0.96;
            note.vy += 0.06;
            note.x += note.vx;
            note.y += note.vy;
            note.angle += flutterWave * 0.012 + note.angularVelocity;
            note.angularVelocity *= 0.9;
            note.flutter *= 0.94;
            note.peel *= 0.92;
            note.shadowLift = Math.max(note.shadowLift * 0.92, note.flutter * 0.72);
            if (pointInRect({ x: note.x, y: note.y }, this.counterRect)) {
              this.scoreNote(note);
            } else if (note.flutter < 0.14) {
              note.restoring = true;
              note.returnBlend = 0;
            }
          } else if (note.restoring || note.detached) {
            note.returnBlend = clamp(note.returnBlend + 0.055, 0, 1);
            note.x += (note.homeX - note.x) * (0.12 + note.returnBlend * 0.08);
            note.y += (note.homeY - note.y) * (0.14 + note.returnBlend * 0.08);
            note.angle += (0 - note.angle) * 0.18;
            note.peel *= 0.86;
            note.shadowLift *= 0.84;
            if (note.returnBlend > 0.98 && Math.hypot(note.x - note.homeX, note.y - note.homeY) < 2) {
              note.restoring = false;
              note.detached = false;
              note.x = note.homeX;
              note.y = note.homeY;
              note.vx = 0;
              note.vy = 0;
              note.peel = 0;
              note.shadowLift = 0;
            }
          } else {
            const driftX = Math.sin(ts * note.driftSpeed + note.driftPhase) * 10;
            const driftY = Math.cos(ts * note.driftSpeed * 0.82 + note.driftPhase * 1.2) * 6;
            note.x += ((note.homeX + driftX) - note.x) * 0.08;
            note.y += ((note.homeY + driftY) - note.y) * 0.08;
            note.angle += ((((Math.sin(ts * note.driftSpeed + note.driftPhase) * 0.02)) - note.angle) * 0.08);
            note.peel *= 0.86;
            note.shadowLift *= 0.84;
          }
        }
        note.vx *= 0.88;
        note.vy *= 0.88;
        note.x = clamp(note.x + note.vx, note.w / 2 + 18, width - note.w / 2 - 18);
        note.y = clamp(note.y + note.vy, note.h / 2 - 28, height - note.h / 2 - 14);
        if (holding && note.detached && pointInRect({ x: note.x, y: note.y }, this.counterRect)) {
          this.scoreNote(note);
        }
      },
      updateCoin(coin, ts) {
        const holding = this.hold.item === coin && this.hold.kind === "coin" && this.pinch.visible && this.pinch.closed;
        if (holding) {
          const target = {
            x: this.pinch.point.x + this.hold.offset.x,
            y: this.pinch.point.y + this.hold.offset.y
          };
          const pos = coin.body.position;
          Body.setVelocity(coin.body, {
            x: (target.x - pos.x) * 0.26 + this.pinch.velocity.x * 0.18,
            y: (target.y - pos.y) * 0.26 + this.pinch.velocity.y * 0.14
          });
          Body.setAngularVelocity(coin.body, coin.body.angularVelocity + this.pinch.velocity.x * 0.0015);
        } else if (coin.counted) {
          coin.fadeOut *= 0.9;
          Body.setVelocity(coin.body, {
            x: coin.body.velocity.x * 0.96,
            y: coin.body.velocity.y - 0.08
          });
          if (coin.fadeOut < 0.04 && coin.body.world) {
            Body.setPosition(coin.body, { x: -9999, y: -9999 });
            Body.setVelocity(coin.body, { x: 0, y: 0 });
            Body.setAngularVelocity(coin.body, 0);
          }
        } else if (!coin.counted && pointInRect(coin.body.position, this.walletRect)) {
          Body.setVelocity(coin.body, {
            x: coin.body.velocity.x * 0.992 + Math.sin(ts * 0.0012 + coin.spawnIndex) * 0.008,
            y: coin.body.velocity.y * 0.992 + Math.cos(ts * 0.0011 + coin.spawnIndex * 1.7) * 0.006
          });
        }
      },
      update() {
        const ts = performance.now();
        if ((!this.pinch.visible || !this.pinch.closed) && this.hold.item) {
          this.releaseHold(ts);
        }
        if (this.pinch.visible && this.pinch.closed && !this.hold.item) {
          const candidate = this.pickCandidate(this.pinch.point);
          if (candidate) this.beginHold(candidate, ts);
        }
        Engine.update(this.engine, 1000 / 60);
        for (const note of this.notes) this.updateNote(note, ts);
        for (const coin of this.coins) this.updateCoin(coin, ts);
        for (let i = this.particles.length - 1; i >= 0; i--) {
          const p = this.particles[i];
          p.life--;
          p.x += p.vx;
          p.y += p.vy;
          p.vy += 0.08;
          p.alpha *= 0.96;
          if (p.life <= 0 || p.alpha < 0.01) {
            this.particles.splice(i, 1);
          }
        }
      },
      drawNote(ctx, note) {
        const sliceCount = 10;
        ctx.save();
        ctx.translate(note.x, note.y);
        ctx.rotate(note.angle);
        ctx.globalAlpha = note.counted ? note.fadeOut : 0.98;
        const shadowAlpha = 0.12 + note.shadowLift * 0.28;
        ctx.shadowColor = `rgba(0,0,0,${shadowAlpha})`;
        ctx.shadowBlur = 12 + note.shadowLift * 18;
        ctx.shadowOffsetY = 8 + note.shadowLift * 15;
        for (let i = 0; i < sliceCount; i++) {
          const t = i / (sliceCount - 1);
          const sx = t * note.img.width;
          const sw = note.img.width / sliceCount + 0.6;
          const dx = -note.w / 2 + t * note.w;
          const dw = note.w / sliceCount + 0.8;
          const grabBias = note.grabCorner === "left" ? 1 - t : t;
          const curlLift = Math.sin(t * Math.PI) * note.peel * 14 + grabBias * note.peel * 34;
          const curlShear = (grabBias - 0.5) * note.peel * 26;
          ctx.drawImage(
            note.img,
            sx, 0, sw, note.img.height,
            dx + curlShear, -note.h / 2 - curlLift, dw, note.h + curlLift * 0.24
          );
        }
        ctx.restore();
      },
      draw(ctx) {
        ctx.save();
        ctx.fillStyle = "rgba(6,6,6,0.28)";
        ctx.fillRect(0, 0, width, height);

        if (this.hold.item) {
            const y = this.counterRect.h;
            ctx.save();
            ctx.shadowColor = 'rgba(255, 255, 255, 0.7)';
            ctx.shadowBlur = 18;
            ctx.strokeStyle = 'rgba(255, 255, 255, 0.6)';
            ctx.lineWidth = 1.5;
            ctx.beginPath();
            ctx.moveTo(0, y);
            ctx.lineTo(width, y);
            ctx.stroke();
            ctx.restore();
        }

        ctx.save();
        const grad = ctx.createLinearGradient(0, this.walletRect.y, 0, this.walletRect.y + this.walletRect.h);
        grad.addColorStop(0, 'rgba(45, 45, 45, 0.5)');
        grad.addColorStop(1, 'rgba(25, 25, 25, 0.6)');
        ctx.fillStyle = grad;
        ctx.strokeStyle = "rgba(255,255,255,0.25)";
        ctx.lineWidth = 1.5;
        ctx.beginPath();
        ctx.roundRect(this.walletRect.x, this.walletRect.y, this.walletRect.w, this.walletRect.h, 34);
        ctx.fill();
        ctx.stroke();
        ctx.restore();


        for (const coin of this.coins) {
          const pos = coin.body.position;
          if (pos.x < -9000) continue;
          ctx.save();
          ctx.translate(pos.x, pos.y);
          ctx.rotate(coin.body.angle);
          ctx.globalAlpha = coin.counted ? coin.fadeOut : 0.98;
          ctx.shadowColor = `rgba(0,0,0,${coin.counted ? 0.24 : 0.18})`;
          ctx.shadowBlur = coin.counted ? 16 : 10;
          ctx.shadowOffsetY = 6;
          ctx.drawImage(coin.img, -coin.w / 2, -coin.h / 2, coin.w, coin.h);
          ctx.restore();
        }

        for (const note of this.noteDrawOrder) {
          if (note.counted && note.fadeOut < 0.04) continue;
          this.drawNote(ctx, note);
        }

        if (this.pinch.visible) {
          ctx.beginPath();
          ctx.arc(this.pinch.point.x, this.pinch.point.y, this.pinch.closed ? 16 : 24, 0, Math.PI * 2);
          ctx.strokeStyle = this.pinch.closed ? "rgba(245,245,245,0.94)" : "rgba(214,214,214,0.58)";
          ctx.lineWidth = this.pinch.closed ? 2.4 : 1.6;
          ctx.stroke();
        }

        ctx.globalCompositeOperation = 'lighter';
        for (const p of this.particles) {
            ctx.fillStyle = `rgba(232, 232, 232, ${p.alpha})`;
            ctx.beginPath();
            ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
            ctx.fill();
        }

        ctx.restore();
      }
    };

    const stage3 = {
      fingertips: new Map(),
      particles: [],
      total: 0,
      zonePulse: 0,
      gateY: 20,
      suctionY: 165,
      targetX: 0,
      targetY: 0,
      resize() {
        this.gateY = -30;
        this.targetX = width / 2;
        this.targetY = 24;
      },
      detectTap(state, now) {
        if (state.history.length < 3 || now < state.cooldownUntil) return false;
        const recent = state.history[state.history.length - 1];
        const prev = state.history[state.history.length - 2];
        const dy = recent.y - prev.y;
        const dx = recent.x - prev.x;
        const speed = Math.hypot(recent.vx, recent.vy);
        const jabDown = dy > 2 && Math.abs(dx) < 72;
        const fastEnough = speed > 3.2 || recent.vy > 2.6;
        const rebound = recent.vy < prev.vy + 8;
        if (jabDown && fastEnough && rebound) {
          state.cooldownUntil = now + 100;
          return true;
        }
        return false;
      },
      spawn(x, y) {
        const values = [10, 50, 100];
        const labels = ["10", "50", "100", "+"];
        const value = values[Math.floor(Math.random() * 3)];
        this.particles.push({
          x, y,
          vx: (Math.random() - 0.5) * 2,
          vy: -3 - Math.random() * 2,
          label: Math.random() < 0.82 ? String(value) : labels[3],
          value,
          alpha: 0.5 + Math.random() * 0.5,
          arrived: false,
        });
      },
      update() {
        this.zonePulse *= 0.92;
        for (let i = this.particles.length - 1; i >= 0; i--) {
          const p = this.particles[i];
          if (!p.arrived && p.y < this.suctionY) {
            const pull = Math.pow(1 - clamp(p.y / this.suctionY, 0, 1), 1.25);
            p.vy -= 0.42 * pull;
            p.vx += (this.targetX - p.x) * 0.0062 * pull;
          }
          p.vy -= 0.03;
          p.vx *= 0.99;
          p.vy *= 0.99;
          p.x += p.vx;
          p.y += p.vy;
          if (!p.arrived && p.y < this.gateY) {
            p.arrived = true;
            this.total += p.value;
            this.zonePulse = 1;
            updateHud();
          }
          if (p.arrived) p.alpha *= 0.9;
          if (p.alpha < 0.05) this.particles.splice(i, 1);
        }
      },
      draw(ctx) {
        ctx.save();
        for (const p of this.particles) {
          ctx.fillStyle = `rgba(240, 240, 240, ${p.alpha})`;
          ctx.font = "700 12px SFMono-Regular, Menlo, monospace";
          ctx.textAlign = "center";
          ctx.fillText(p.label, p.x, p.y);
        }
        for (const state of this.fingertips.values()) {
          if (!state.visible) continue;
          state.flash *= 0.88;
          ctx.beginPath();
          ctx.arc(state.point.x, state.point.y, 7, 0, Math.PI * 2);
          ctx.fillStyle = "rgba(242,242,242,0.94)";
          ctx.fill();
        }
        ctx.restore();
      }
    };

    const stage4 = {
      vines: [],
      sparks: [],
      costAnimations: [],
      activity: 0,
      centerFlash: 0,
      origin: { x: width / 2, y: height / 2 },
      blink: {
        visible: false,
        blinkCooldownUntil: 0,
        faceCenter: { x: width / 2, y: height * 0.45 },
        leftEyeCenter: { x: width * 0.46, y: height * 0.42 },
        rightEyeCenter: { x: width * 0.54, y: height * 0.42 }
      },
      createVine(x, y, direction) {
        return {
          path: [{ x, y }],
          direction: direction,
          speed: 1.8 + Math.random() * 2.8,
          life: 120 + Math.random() * 80, // 수명을 늘려 화면 끝까지 도달할 확률 증가

      resize() {

      },
      fire() {
        this.centerFlash = 1;

        this.activity += cost;
        updateHud();

        this.costAnimations.push({
            value: `+${cost}`,

            y: this.origin.y - 20,

        });

        const numVines = 15 + Math.floor(Math.random() * 10);

      update(ts) {
        this.origin.x = width / 2;
        this.origin.y = height / 2;
        this.centerFlash *= 0.9;

        for (let i = this.vines.length - 1; i >= 0; i--) {
          const v = this.vines[i];
          v.life--;
          if (v.life <= 0) {
            v.alpha *= 0.88;
            if (v.alpha < 0.01) {
              this.vines.splice(i, 1);
            }
            continue;
          }

          const tip = v.path[v.path.length - 1];
          v.direction += v.turnRate; // 매 프레임마다 미세하게 방향 전환
          v.turnRate *= 0.99; // 방향 전환율을 점차 감소시켜 부드러운 곡선 생성

          const nextX = tip.x + Math.cos(v.direction) * v.speed;
          const nextY = tip.y + Math.sin(v.direction) * v.speed;

          if (nextX < 0 || nextX > width || nextY < 0 || nextY > height) {
            v.life = 0;
          } else {
            v.path.push({ x: nextX, y: nextY });
            v.length += v.speed;
          }

          if (v.length < v.maxLength && Math.random() < v.branchChance && this.vines.length < 350) {
            const newDirection = v.direction + (Math.random() > 0.5 ? 1 : -1) * (0.5 + Math.random() * 0.8);
            this.vines.push(this.createVine(nextX, nextY, newDirection));
            this.sparks.push({
              x: nextX, y: nextY,
              life: 30 + Math.random() * 15, // 반짝임 수명 약간 증가
              alpha: 0.7 + Math.random() * 0.3,
              size: 1.8 + Math.random() * 0.8 // 점 크기를 약 2px로 조절
            });

        for (let i = this.sparks.length - 1; i >= 0; i--) {
          const s = this.sparks[i];
          s.life--;
          s.alpha *= 0.9; // 반짝임이 조금 더 잘 보이도록 천천히 사라지게 조절
          if (s.life <= 0 || s.alpha < 0.01) {
            this.sparks.splice(i, 1);
          }
        }

        for (let i = this.costAnimations.length - 1; i >= 0; i--) {
            const anim = this.costAnimations[i];
            anim.life--;
            anim.y += anim.vy;
            anim.vy *= 0.99;
            if (anim.life < 30) {
                anim.alpha *= 0.92;
            }

            }
        }
      },
      draw(ctx) {
        if (this.vines.length === 0 && this.centerFlash === 0 && this.costAnimations.length === 0) {
            ctx.save();
            ctx.fillStyle = `rgba(255,255,255,0.85)`;
            ctx.beginPath();
            ctx.arc(this.origin.x, this.origin.y, 4, 0, Math.PI * 2);
            ctx.fill();
            ctx.restore();

        ctx.save();
        ctx.lineCap = "round";
        for (const v of this.vines) {
          if (v.path.length < 2) continue;

          ctx.moveTo(v.path[0].x, v.path[0].y);
          for (let j = 1; j < v.path.length; j++) {
            ctx.lineTo(v.path[j].x, v.path[j].y);
          }
          ctx.strokeStyle = `rgba(255, 255, 255, ${v.alpha * 0.7})`;
          ctx.lineWidth = v.lineWidth;
          ctx.stroke();

        ctx.globalCompositeOperation = "lighter";
        for (const s of this.sparks) {
          ctx.beginPath();
          ctx.arc(s.x, s.y, s.size, 0, Math.PI * 2);
          ctx.fillStyle = `rgba(255, 255, 255, ${s.alpha})`;
          ctx.fill();
        }
        ctx.globalCompositeOperation = "source-over";

        const cf = this.centerFlash;
        ctx.shadowColor = `rgba(255,255,255,${0.4 + cf * 0.6})`;
        ctx.shadowBlur = 6 + cf * 25;
        ctx.fillStyle = `rgba(255,255,255,${0.85 + cf * 0.15})`;
        ctx.beginPath();
        ctx.arc(this.origin.x, this.origin.y, 4 + cf * 2.5, 0, Math.PI * 2);
        ctx.fill();

        ctx.shadowBlur = 0;
        for (const anim of this.costAnimations) {
            ctx.fillStyle = `rgba(255, 255, 255, ${anim.alpha * 0.9})`;
            ctx.font = "700 14px SFMono-Regular, Menlo, monospace";
            ctx.textAlign = "center";
            ctx.fillText(anim.value, anim.x, anim.y);
        }

        ctx.restore();
      }
    };

    const hands = new Hands({ locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}` });

    hands.onResults((results) => {

        const next = { x: (1 - sx / pts.length) * width, y: sy / pts.length * height };
        const prev = { ...stage1.hand.point };
        stage1.hand.visible = true;
        stage1.hand.fist = curled >= 2 || (curled >= 1 && thumbIndex < 0.16);
        stage1.hand.point = { x: prev.x + (next.x - prev.x) * 0.4, y: prev.y + (next.y - prev.y) * 0.4 };
        stage1.hand.velocity = { x: stage1.hand.point.x - prev.x, y: stage1.hand.point.y - prev.y };
        stage1.hand.landmarks = lm.map(p => ({ x: (1 - p.x) * width, y: p.y * height }));
      } else if (activeStage === 2) {

        const lm = results.multiHandLandmarks[0];
        const thumb = getScreenPoint(lm, 4);

        const prev = { ...stage2.pinch.point };
        const center = { x: (thumb.x + index.x) * 0.5, y: (thumb.y + index.y) * 0.5 };
        const wrist = lm[0], indexMcp = lm[5];
        const handScale = Math.hypot(indexMcp.x - wrist.x, indexMcp.y - wrist.y) || 0.08;
        const thumbIndex = Math.hypot(lm[4].x - lm[8].x, lm[4].y - lm[8].y);
        stage2.pinch.visible = true;
        stage2.pinch.active = true;
        stage2.pinch.mode = "single";
        stage2.pinch.closed = thumbIndex < handScale * 0.7;
        stage2.pinch.strength = clamp(1 - thumbIndex / (handScale * 1.45), 0, 1);
        stage2.pinch.point = { x: prev.x + (center.x - prev.x) * 0.5, y: prev.y + (center.y - prev.y) * 0.5 };
        stage2.pinch.velocity = { x: stage2.pinch.point.x - prev.x, y: stage2.pinch.point.y - prev.y };
      } else if (activeStage === 3) {
        const now = performance.now();
        const seen = new Set();
        if (!results.multiHandLandmarks || !results.multiHandLandmarks.length) {
          stage3.fingertips.forEach((s) => { s.visible = false; s.history.length = 0; });
          return;
        }
        const tipIndices = [4, 8, 12, 16, 20];
        results.multiHandLandmarks.forEach((lm, handIdx) => {
          tipIndices.forEach((fingerIdx) => {
            const key = `${handIdx}-${fingerIdx}`;
            if (!stage3.fingertips.has(key)) {
              stage3.fingertips.set(key, { visible: true, point: getScreenPoint(lm, fingerIdx), velocity: { x: 0, y: 0 }, history: [], cooldownUntil: 0, flash: 0 });
            }
            const state = stage3.fingertips.get(key);
            const point = getScreenPoint(lm, fingerIdx);
            const prev = { ...state.point };
            state.visible = true;
            state.point = { x: prev.x + (point.x - prev.x) * 0.7, y: prev.y + (point.y - prev.y) * 0.7 };
            state.velocity = { x: state.point.x - prev.x, y: state.point.y - prev.y };
            state.history.push({ x: state.point.x, y: state.point.y, vx: state.velocity.x, vy: state.velocity.y, t: now });
            if (state.history.length > 8) state.history.shift();
            seen.add(key);
            if (stage3.detectTap(state, now)) {
              stage3.spawn(state.point.x, state.point.y);
              state.flash = 1;
            }
          });
        });
        stage3.fingertips.forEach((s, key) => { if (!seen.has(key)) { s.visible = false; s.history.length = 0; } });
      }
    });

    const faceMesh = new FaceMesh({ locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/${file}` });
    faceMesh.setOptions({ maxNumFaces: 1, refineLandmarks: true, minDetectionConfidence: 0.5, minTrackingConfidence: 0.5 });
    faceMesh.onResults((results) => {
      if (activeStage !== 4) return;
      const now = performance.now();
      if (!results.multiFaceLandmarks || !results.multiFaceLandmarks.length) {
        stage4.blink.visible = false;
        return;
      }
      const lm = results.multiFaceLandmarks[0];
      const eyeRatio = ([outer, upper, lower, inner]) => {
        const a = lm[outer], b = lm[upper], c = lm[lower], d = lm[inner];
        const horiz = Math.hypot(a.x - d.x, a.y - d.y) || 0.001;
        const vert = Math.hypot(b.x - c.x, b.y - c.y);
        return vert / horiz;
      };
      const left = eyeRatio([33, 159, 145, 133]);
      const right = eyeRatio([362, 386, 374, 263]);
      const ear = (left + right) * 0.5;
      stage4.blink.visible = true;
      const faceRef = lm[1], leftEyeRef = lm[33], rightEyeRef = lm[263];
      stage4.blink.faceCenter = { x: (1 - faceRef.x) * width, y: faceRef.y * height };
      stage4.blink.leftEyeCenter = { x: (1 - leftEyeRef.x) * width, y: leftEyeRef.y * height };
      stage4.blink.rightEyeCenter = { x: (1 - rightEyeRef.x) * width, y: rightEyeRef.y * height };
      if (ear < 0.17 && now > stage4.blink.blinkCooldownUntil) {
        stage4.blink.blinkCooldownUntil = now + 900;
        stage4.fire();
      }
    });

    async function setupCamera() {
      const stream = await navigator.mediaDevices.getUserMedia({ video: { width: 640, height: 480, facingMode: "user" }, audio: false });
      video.srcObject = stream;
      await video.play();
      videoReady = true;
    }

    async function runVision(ts) {
      if (!videoReady || video.readyState < HTMLMediaElement.HAVE_CURRENT_DATA) return;
      if (ts - lastVisionTs < 66) return;
      lastVisionTs = ts;
      if (activeStage === 4) {
        if (faceBusy) return;
        faceBusy = true;
        try { await faceMesh.send({ image: video }); } finally { faceBusy = false; }
      } else if (activeStage > 0) {
        if (handsBusy) return;
        handsBusy = true;
        try { await hands.send({ image: video }); } finally { handsBusy = false; }
      }
    }

    function drawStage(ts) {
      sceneCtx.clearRect(0, 0, width, height);
      if (stageTransition.active) {
        drawStageMorph(sceneCtx, ts);
      } else {
        if (activeStage === 0) stage0.draw(sceneCtx);
        if (activeStage === 1) stage1.draw(sceneCtx);
        if (activeStage === 2) stage2.draw(sceneCtx);
        if (activeStage === 3) stage3.draw(sceneCtx);
        if (activeStage === 4) stage4.draw(sceneCtx);
      }

      // 공통 카운팅 영역 — 정중앙 원형 그라디언트, 카운트 시 pulse
      sceneCtx.shadowBlur = 0;
      sceneCtx.globalAlpha = 1;
      sceneCtx.globalCompositeOperation = "source-over";
      hudPulse *= 0.86;
      if (hudPulse > 0.01) {
        const cx = width / 2, cy = 0;
        const r = Math.min(width, height) * 0.38;
        const eased = hudPulse * hudPulse;
        const radGrad = sceneCtx.createRadialGradient(cx, cy, 0, cx, cy, r);
        radGrad.addColorStop(0,   `rgba(255,255,255,${(eased * 0.28).toFixed(3)})`);
        radGrad.addColorStop(0.5, `rgba(255,255,255,${(eased * 0.08).toFixed(3)})`);
        radGrad.addColorStop(1,   'rgba(255,255,255,0)');
        sceneCtx.fillStyle = radGrad;
        sceneCtx.fillRect(0, 0, width, height);
      }
    }

    function tick(ts) {
      tick.last = ts;
      drawWebcam();
      if (activeStage === 1) stage1.update();
      if (activeStage === 2) stage2.update();
      if (activeStage === 3) stage3.update();
      if (activeStage === 4) stage4.update(ts);
      drawStage(ts);
      runVision(ts);
      requestAnimationFrame(tick);
    }

    resize();
    goToStage(0, { immediate: true });
    window.addEventListener("resize", resize);

    setupCamera()
      .catch(() => {});

    requestAnimationFrame(tick);
  </script>
</body>
</html>

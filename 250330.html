<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>화폐 진화 단일 앱</title>
  <style>
    :root {
      --bg: #0b0b0b;
      --text: rgba(242, 242, 242, 0.94);
      --muted: rgba(176, 176, 176, 0.56);
      --line: rgba(255, 255, 255, 0.18);
      --gold: rgb(232, 232, 232);
      --mono: "Courier New", Courier, monospace;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: var(--bg);
      color: var(--text);
      font-family: var(--mono);
    }

    body {
      background:
        radial-gradient(ellipse at 50% 0%, rgba(40,40,40,0.14) 0%, transparent 55%),
        #0b0b0b;
    }

    #video {
      display: none;
    }

    #webcam-layer {
      display: none;
    }

    #webcam-preview {
      position: fixed;
      right: 18px;
      top: 18px;
      width: 160px;
      height: 120px;
      z-index: 6;
      border: 1px solid rgba(255, 255, 255, 0.6);
      filter: saturate(0.2) contrast(1.1);
      pointer-events: none;
      opacity: 0;
    }

    #scene-layer {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 2;
    }

    #viewport {
      position: fixed;
      inset: 0;
      z-index: 3;
      overflow-y: auto;
      scroll-snap-type: y mandatory;
      scroll-behavior: smooth;
    }

    #viewport {
      -ms-overflow-style: none; /* IE and Edge */
      scrollbar-width: none; /* Firefox */
    }
    #viewport::-webkit-scrollbar {
      display: none; /* Chrome, Safari, Opera*/
    }

    .stage {
      position: relative;
      min-height: 100vh;
      scroll-snap-align: start;
    }

    #hud {
      position: fixed;
      inset: 0;
      z-index: 5;
      pointer-events: none;
    }

    #panel {
      position: fixed;
      left: 40px;
      top: 40px;
      border: 1px solid rgba(255, 255, 255, 0.7);
      padding: 6px 12px;
      pointer-events: none;
      display: flex;
      align-items: baseline;
      gap: 0;
    }

    #panel-label {
      color: var(--text);
      font-family: var(--mono);
      font-size: 15px;
      font-weight: 400;
      letter-spacing: 0.04em;
    }

    #panel-value {
      color: var(--text);
      font-family: var(--mono);
      font-size: 15px;
      font-weight: 400;
      letter-spacing: 0.04em;
      opacity: 1;
      transform: none;
    }

    #dock {
      position: fixed;
      right: 22px;
      top: 50%;
      bottom: auto;
      transform: translateY(-50%);
      z-index: 6;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 14px;
      padding: 0;
    }

    .dot {
      width: 6px;
      height: 6px;
      border-radius: 0;
      border: 0;
      background: rgba(255,255,255,0.22);
      cursor: pointer;
      padding: 0;
      transition: transform 160ms ease, background-color 160ms ease;
    }

    .dot.active {
      background: rgba(255,255,255,0.92);
      transform: scale(1.7);
    }

    #stage-title {
      display: none;
    }

    #stage-text {
      position: fixed;
      left: 40px;
      top: 50%;
      transform: translateY(-50%);
      z-index: 6;
      max-width: 300px;
      pointer-events: none; 
    }

    .stage-q {
      font-family: var(--mono);
      font-size: 12px;
      font-weight: 400;
      letter-spacing: 0.04em;
      color: rgba(200, 200, 200, 0.7);
      margin-bottom: 16px;
    }

    .stage-name {
      font-family: var(--mono);
      font-size: 14px;
      font-weight: 700;
      letter-spacing: 0.04em;
      color: var(--text);
      margin-bottom: 12px;
    }

    .stage-desc {
      font-family: var(--mono);
      font-size: 12px;
      font-weight: 400;
      line-height: 1.4;
      color: rgba(255, 255, 255, 0.7);
      margin-bottom: 8px;
      white-space: pre-line;
    }

    .dud {
      color: rgba(165, 165, 165, 0.52);
    }

    #stage-text.is-intro {
      left: 50%;
      top: 50%;
      transform: translate(-50%, -50%);
      text-align: center;
      max-width: 90vw;
    }

    #stage-text.is-intro .stage-q {
      color: #ffffff;
      opacity: 1;
      font-size: 24px;
    }

    #stage-text.is-intro .stage-name,
    #stage-text.is-intro .stage-desc {
      display: none;
    }

    @media (max-width: 720px) {
      #stage-text {
        left: 16px;
        max-width: 260px;
      }
      #stage-text .stage-q,
      #stage-text .stage-name {
        font-size: 12px;
      }
      #stage-text .stage-desc {
        font-size: 12px;
      }
      #webcam-preview {
        width: 100px;
        height: 75px;
        right: 12px;
        top: 12px;
      }
      #panel {
        left: 12px;
        top: 12px;
        font-size: 14px;
      }
      #panel-label, #panel-value {
        font-size: 14px;
      }
      #dock {
        right: 12px;
      }
    }

    #stage4-overlay {
      position: fixed;
      inset: 0;
      z-index: 1;
      pointer-events: none;
      overflow: hidden;
      opacity: 0;
      transition: opacity 420ms ease;
    }

    #stage4-overlay img {
      position: absolute;
    }

    #stage4-overlay.active {
      opacity: 1;
    }

    #panel.inverted {
      background: #ffffff;
      border-color: rgba(255, 255, 255, 0.9);
    }

    #panel.inverted #panel-label,
    #panel.inverted #panel-value {
      color: #000000;
    }

    #reset-btn {
      position: fixed;
      top: 40px;
      right: 40px;
      z-index: 8;
      width: 30px;
      height: 30px;
      background: transparent;
      border: 1px solid rgba(255, 255, 255, 0.05);
      color: rgba(255, 255, 255, 0.1);
      display: none;
      align-items: center;
      justify-content: center;
      padding: 0;
      cursor: pointer;
      outline: none;
      box-sizing: border-box;
      transition: color 180ms ease, border-color 180ms ease;
      -webkit-tap-highlight-color: transparent;
    }
    #reset-btn.visible {
      display: inline-flex;
    }
    #reset-btn:hover {
      color: rgba(255, 255, 255, 0.6);
      border-color: rgba(255, 255, 255, 0.3);
    }
    #reset-btn svg {
      width: 14px;
      height: 14px;
      display: block;
    }

    #archive-link {
      position: fixed;
      left: 40px;
      top: 40px;
      z-index: 8;
      border: 1px solid rgba(255, 255, 255, 0.7);
      padding: 6px 12px;
      background: transparent;
      color: rgba(242, 242, 242, 0.94);
      font-family: "Courier New", Courier, monospace;
      font-size: 15px;
      font-weight: 400;
      letter-spacing: 0.04em;
      line-height: 1;
      text-decoration: none;
      display: none;
      align-items: baseline;
      cursor: pointer;
      opacity: 0;
      transition: opacity 600ms ease, background 180ms ease, color 180ms ease;
      -webkit-tap-highlight-color: transparent;
    }
    #archive-link.visible {
      display: inline-flex;
      opacity: 1;
    }
    #archive-link:hover {
      background: #ffffff;
      color: #000000;
    }
  </style>
</head>
<body>
  <video id="video" playsinline autoplay muted></video>
  <canvas id="webcam-layer"></canvas>
  <canvas id="scene-layer"></canvas>
  <canvas id="webcam-preview"></canvas>

  <div id="viewport">
    <section class="stage" data-index="0"></section>
    <section class="stage" data-index="1"></section>
    <section class="stage" data-index="2"></section>
    <section class="stage" data-index="3"></section>
    <section class="stage" data-index="4"></section>
    <section class="stage" data-index="5"></section>
  </div>

  <div id="hud">
    <div id="panel">
      <span id="panel-label">Cost&nbsp;&nbsp;:&nbsp;</span><span id="panel-value">0000$</span>
    </div>
  </div>

  <!-- Stage 4 Overlay (Step4_2 design) -->
  <div id="stage4-overlay">
    <!-- 배경 요소가 모두 제거되었습니다. -->
  </div>

  <div id="dock"></div>
  <button id="reset-btn" type="button" aria-label="Reset">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
      <path d="M21 12a9 9 0 1 1-9-9c2.52 0 4.93 1 6.74 2.74L21 8"/>
      <path d="M21 3v5h-5"/>
    </svg>
  </button>
  <a id="archive-link" href="./research.html">Archive</a>
  <div id="stage-title">Shell Currency</div>

  <div id="stage-text">
    <div class="stage-q">HOW IS IT MONEY?</div>
    <h2 class="stage-name">SHELL</h2>
    <p class="stage-desc">Shells were mainly used for barter.<br>But then again, what you receive in<br>return may not be money either.</p>
    <p class="stage-desc">Isn't it heavy to carry?<br>Be careful not to drop your shells.<br>You may not get as many goods as you want.</p>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/matter-js/0.19.0/matter.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/face_mesh.js" crossorigin="anonymous"></script>

  <script>
    const video = document.getElementById("video");
    const webcamCanvas = document.getElementById("webcam-layer");
    const sceneCanvas = document.getElementById("scene-layer");
    const previewCanvas = document.getElementById("webcam-preview");
    const sceneCtx = sceneCanvas.getContext("2d");
    const previewCtx = previewCanvas.getContext("2d");
    const viewport = document.getElementById("viewport");
    const stages = [...document.querySelectorAll(".stage")];
    const dock = document.getElementById("dock");
    const panelValueEl = document.getElementById("panel-value");
    const { Engine, World, Bodies, Body } = Matter;

    let width = window.innerWidth;
    let height = window.innerHeight;
    let activeStage = 0;
    let videoReady = false;
    let handsBusy = false;
    let faceBusy = false;
    let lastVisionTs = 0;

    const stageTexts = [
      {
        q: "HOW IS IT MONEY?",
        name: "",
        descs: []
      },
      {
        q: "HOW IS IT MONEY?",
        name: "SHELL",
        descs: [
          "Shells were mainly used for barter.\nBut then again, what you receive in\nreturn may not be money either.",
          "Isn't it heavy to carry?\nBe careful not to drop your shells.\nYou may not get as many goods as you want."
        ]
      },
      {
        q: "HOW IS IT MONEY?",
        name: "STANDARDIZED MONEY",
        descs: [
          "Coins and bills gave value a fixed form.\nStandardization made trade easier\nacross different regions and people.",
          "Count it, store it, spend it.\nBut what happens when the paper\nis worth more than what backs it?"
        ]
      },
      {
        q: "HOW IS IT MONEY?",
        name: "DIGITAL TRANSFER",
        descs: [
          "Money became a signal. Numbers\nflowing through wires, invisible\nyet universally accepted.",
          "Touch to send. Tap to receive.\nThe physical bill is now a memory\nof a slower, heavier world."
        ]
      },
      {
        q: "HOW IS IT MONEY?",
        name: "VIRTUAL ASSET",
        descs: [
          "Decentralized, encrypted, scarce.\nNo government backs it.\nConsensus is its only authority.",
          "Blink and the value shifts.\nIs it money, or a bet on what\nmoney might become?"
        ]
      },
      {
        q: "FINAL TALLY",
        name: "ARCHIVE",
        descs: [
          "Across shell, paper, signal, and code\nthe ledger settles to a single sum.",
          "What was once weighed, counted, swiped,\nand wagered is recorded here as one."
        ]
      }
    ];

    const stageTextEl = document.getElementById("stage-text");
    const stage4OverlayEl = document.getElementById("stage4-overlay");
    const transitionCanvas = document.createElement("canvas");
    const transitionCtx = transitionCanvas.getContext("2d", { willReadFrequently: true });
    const transitionTargetCanvas = document.createElement("canvas");
    const transitionTargetCtx = transitionTargetCanvas.getContext("2d", { willReadFrequently: true });
    const textScrambleChars = "!<>-_\\/[]{}=+*^?#________";
    let stageTextRun = 0;
    const stageTransition = {
      active: false,
      fromIndex: 0,
      toIndex: 0,
      startedAt: 0,
      particles: []
    };

    function clamp01(v) {
      return Math.max(0, Math.min(1, v));
    }

    function randomScrambleChar() {
      return textScrambleChars[Math.floor(Math.random() * textScrambleChars.length)];
    }

    function wait(ms) {
      return new Promise((resolve) => setTimeout(resolve, ms));
    }

    function scrambleText(el, nextText, runId) {
      const previousText = el.textContent || "";
      const length = Math.max(previousText.length, nextText.length);
      const queue = [];
      for (let i = 0; i < length; i++) {
        queue.push({
          from: previousText[i] || "",
          to: nextText[i] || "",
          start: Math.floor(Math.random() * 24),
          end: 28 + Math.floor(Math.random() * 28),
          char: ""
        });
      }
      let frame = 0;
      return new Promise((resolve) => {
        function update() {
          if (runId !== stageTextRun) {
            resolve();
            return;
          }
          let output = "";
          let done = 0;
          for (const item of queue) {
            if (frame >= item.end) {
              done += 1;
              output += item.to;
            } else if (frame >= item.start) {
              if (!item.char || Math.random() < 0.28) item.char = randomScrambleChar();
              output += `<span class="dud">${item.char}</span>`;
            } else {
              output += item.from;
            }
          }
          el.innerHTML = output;
          if (done === queue.length) {
            el.textContent = nextText;
            resolve();
            return;
          }
          frame += 1;
          requestAnimationFrame(update);
        }
        update();
      });
    }

    function mountStageText(index) {
      const t = stageTexts[index];
      stageTextEl.innerHTML = `
        <div class="stage-q"></div>
        <h2 class="stage-name"></h2>
        ${t.descs.map(() => `<p class="stage-desc"></p>`).join("")}
      `;
      return {
        qEl: stageTextEl.querySelector(".stage-q"),
        nameEl: stageTextEl.querySelector(".stage-name"),
        descEls: [...stageTextEl.querySelectorAll(".stage-desc")]
      };
    }

    function setStageText(index, immediate = false) {
      const t = stageTexts[index];
      const { qEl, nameEl, descEls } = mountStageText(index);
      if (immediate) {
        qEl.textContent = t.q;
        nameEl.textContent = t.name;
        descEls.forEach((el, i) => { el.innerHTML = t.descs[i].replace(/\n/g, "<br>"); });
        return;
      }
      const runId = ++stageTextRun;
      (async () => {
        await scrambleText(qEl, t.q, runId);
        if (runId !== stageTextRun) return;
        if (t.name && t.name.length > 0) {
          await wait(80);
          const titleJob = scrambleText(nameEl, t.name, runId);
          const descJobs = descEls.map((el, i) => (async () => {
            await wait(150 + i * 150);
            if (runId !== stageTextRun) return;
            await scrambleText(el, t.descs[i], runId);
            if (runId !== stageTextRun) return;
            el.innerHTML = t.descs[i].replace(/\n/g, "<br>");
          })());
          await Promise.all([titleJob, ...descJobs]);
        }
      })();
    }

    function renderStageByIndex(targetCtx, index) {
      targetCtx.save();
      targetCtx.setTransform(1, 0, 0, 1, 0, 0);
      targetCtx.clearRect(0, 0, width, height);
      if (index === 0) stage0.draw(targetCtx);
      if (index === 1) stage1.draw(targetCtx);
      if (index === 2) stage2.draw(targetCtx);
      if (index === 3) stage3.draw(targetCtx);
      if (index === 4) stage4.draw(targetCtx);
      if (index === 5) stage5.draw(targetCtx);
      targetCtx.restore();
    }

    const TRANSITION_GRID = 5;
    const TRANSITION_FALL_SPAN = 14;
    const TRANSITION_RISE_SPAN = 14;
    const TRANSITION_MAX_FRAMES = 110;
    const TRANSITION_FADE_START = 70;
    const TRANSITION_FADE_SPAN = 26;

    function buildTransitionParticles() {
      const particles = [];
      const grid = TRANSITION_GRID;
      const cellsX = Math.max(1, Math.floor(width / grid));
      const cellsY = Math.max(1, Math.floor(height / grid));
      let fromData = null;
      let toData = null;
      try {
        fromData = transitionCtx.getImageData(0, 0, width, height).data;
        toData = transitionTargetCtx.getImageData(0, 0, width, height).data;
      } catch (e) { return particles; }
      const W = width;
      const H = height;
      const halfCell = grid >> 1;
      let contentCount = 0;
      for (let cy = 0; cy < cellsY; cy++) {
        const py = Math.min(H - 1, cy * grid + halfCell);
        for (let cx = 0; cx < cellsX; cx++) {
          const px = Math.min(W - 1, cx * grid + halfCell);
          const i = (py * W + px) * 4;
          const fromBright = Math.max(fromData[i], fromData[i + 1], fromData[i + 2]);
          const toBright = Math.max(toData[i], toData[i + 1], toData[i + 2]);
          const hasFrom = fromBright > 60;
          const hasTo = toBright > 60;
          const xRatio = cellsX > 1 ? cx / (cellsX - 1) : 0;
          const yRatio = cellsY > 1 ? cy / (cellsY - 1) : 0;
          if (!hasFrom && !hasTo) continue;
          contentCount++;
          particles.push({
            x: cx * grid,
            y: cy * grid,
            hasFrom,
            hasTo,
            fallDelay: xRatio * 14 + yRatio * 4 + Math.random() * 4,
            riseDelay: 18 + xRatio * 12 + yRatio * 3 + Math.random() * 4
          });
        }
      }
      return particles;
    }

    function buildIconParticles(iconData) {
      if (!iconData || !iconData.points.length) return null;
      const cx = width / 2;
      const cy = height / 2;
      const offsetX = cx - iconData.w / 2;
      const offsetY = cy - iconData.h / 2;
      const particles = [];
      for (const p of iconData.points) {
        const tx = p.x + offsetX;
        const ty = p.y + offsetY;
        const startA = Math.random() * Math.PI * 2;
        const startR = 200 + Math.random() * 280;
        const endA = Math.atan2(ty - cy, tx - cx) + (Math.random() - 0.5) * 0.8;
        const endR = 140 + Math.random() * 240;
        particles.push({
          tx, ty,
          sx: cx + Math.cos(startA) * startR,
          sy: cy + Math.sin(startA) * startR,
          ex: tx + Math.cos(endA) * endR,
          ey: ty + Math.sin(endA) * endR + Math.random() * 70,
          assembleDelay: Math.random() * 18,
          disperseDelay: Math.random() * 18
        });
      }
      return { particles, cx, cy };
    }

    function beginStageMorph(fromIndex, toIndex) {
      transitionCanvas.width = width;
      transitionCanvas.height = height;
      transitionTargetCanvas.width = width;
      transitionTargetCanvas.height = height;
      renderStageByIndex(transitionCtx, fromIndex);
      renderStageByIndex(transitionTargetCtx, toIndex);
      stageTransition.active = true;
      stageTransition.fromIndex = fromIndex;
      stageTransition.toIndex = toIndex;
      stageTransition.startedAt = performance.now();
      stageTransition.particles = buildTransitionParticles();
      stageTransition.iconAnim = buildIconParticles(transitionIcons[toIndex]);
    }

    function drawStageMorph(ctx, ts) {
      if (!stageTransition.active) return;
      const elapsed = ts - stageTransition.startedAt;
      const frames = elapsed / 16.6667;

      const newAlpha = clamp01((frames - TRANSITION_FADE_START) / TRANSITION_FADE_SPAN);
      if (newAlpha > 0) {
        ctx.save();
        ctx.globalAlpha = newAlpha;
        ctx.drawImage(transitionTargetCanvas, 0, 0);
        ctx.restore();
      }

      const iconAnim = stageTransition.iconAnim;
      if (iconAnim) {
        const ASSEMBLE_START = 10;
        const ASSEMBLE_SPAN = 22;
        const DISPERSE_START = 56;
        const DISPERSE_SPAN = 24;
        ctx.save();
        ctx.fillStyle = "#f0f0f0";
        for (const p of iconAnim.particles) {
          const tAssemble = frames - ASSEMBLE_START - p.assembleDelay;
          const tDisperse = frames - DISPERSE_START - p.disperseDelay;
          let dx, dy, alpha;
          if (tDisperse > 0) {
            if (tDisperse >= DISPERSE_SPAN) continue;
            const k = tDisperse / DISPERSE_SPAN;
            const e = k * k;
            dx = p.tx + (p.ex - p.tx) * e;
            dy = p.ty + (p.ey - p.ty) * e;
            alpha = 1 - k;
          } else if (tAssemble > 0) {
            if (tAssemble < ASSEMBLE_SPAN) {
              const k = tAssemble / ASSEMBLE_SPAN;
              const e = 1 - Math.pow(1 - k, 3);
              dx = p.sx + (p.tx - p.sx) * e;
              dy = p.sy + (p.ty - p.sy) * e;
              alpha = e;
            } else {
              dx = p.tx;
              dy = p.ty;
              alpha = 1;
            }
          } else {
            continue;
          }
          if (alpha < 0.04) continue;
          ctx.globalAlpha = alpha * 0.94;
          ctx.fillRect(dx | 0, dy | 0, ICON_DOT, ICON_DOT);
        }
        ctx.restore();
      }

      const sz = Math.max(1, TRANSITION_GRID - 1);
      ctx.save();
      ctx.fillStyle = "#f0f0f0";
      let aliveCount = 0;
      for (const p of stageTransition.particles) {
        let alpha = 0;
        let dy = 0;

        if (p.hasFrom) {
          const t = frames - p.fallDelay;
          if (t < 0) {
            alpha = 1;
          } else if (t < TRANSITION_FALL_SPAN) {
            const k = t / TRANSITION_FALL_SPAN;
            alpha = 1 - k;
            dy = k * k * 220;
            aliveCount++;
          }
        }

        if (p.hasTo) {
          const t = frames - p.riseDelay;
          if (t > 0) {
            if (t < TRANSITION_RISE_SPAN) {
              const k = t / TRANSITION_RISE_SPAN;
              const a = k;
              const ndy = -(1 - k) * 60;
              if (a > alpha) {
                alpha = a;
                dy = ndy;
              }
              aliveCount++;
            } else if (alpha < 1) {
              alpha = 1;
              dy = 0;
            }
          }
        }

        if (alpha < 0.04) continue;
        ctx.globalAlpha = alpha * 0.94;
        ctx.fillRect(p.x, p.y + dy, sz, sz);
      }
      ctx.restore();

      if (frames > TRANSITION_MAX_FRAMES || (frames > 30 && aliveCount === 0 && newAlpha >= 1)) {
        stageTransition.active = false;
        stageTransition.particles.length = 0;
      }
    }

    function formatCost(n) {
      return n.toLocaleString("en-US") + "$";
    }

    const panelEl = document.getElementById("panel");
    const panelLabelEl = document.getElementById("panel-label");
    const archiveLinkEl = document.getElementById("archive-link");
    const resetBtnEl = document.getElementById("reset-btn");
    let panelInvertTimer = null;
    let archiveLinkTimer = null;
    let hudPulse = 0;

    function updateHud(animate = true) {
      let val = 0;
      let labelText = "Cost  : ";
      if (activeStage === 1) val = stage1.count;
      if (activeStage === 2) val = stage2.count;
      if (activeStage === 3) val = stage3.total;
      if (activeStage === 4) val = stage4.activity;
      if (activeStage === 5) {
        val = stage2.count + stage3.total + stage4.activity;
        labelText = "Total : ";
      }
      const newText = formatCost(val);
      if (panelLabelEl.textContent !== labelText) panelLabelEl.textContent = labelText;
      if (newText !== panelValueEl.textContent) {
        panelEl.classList.add("inverted");
        clearTimeout(panelInvertTimer);
        panelInvertTimer = setTimeout(() => panelEl.classList.remove("inverted"), 350);
        hudPulse = 1;
      }
      panelValueEl.textContent = newText;
    }

    stages.forEach((stage, index) => {
      if (index < 1 || index > 4) {
        stage._dot = null;
        return;
      }
      const dot = document.createElement("button");
      dot.className = "dot";
      dot.type = "button";
      dot.addEventListener("click", () => {
        goToStage(index);
      });
      dock.appendChild(dot);
      stage._dot = dot;
    });

    function goToStage(index, { immediate = false, syncScroll = true } = {}) {
      const nextIndex = clamp(index, 0, stages.length - 1);
      activateStage(nextIndex, { immediate });
      if (syncScroll) {
        viewport.scrollTo({ top: nextIndex * height, behavior: immediate ? "auto" : "smooth" });
      }
    }

    function activateStage(index, { immediate = false } = {}) {
      if (index === activeStage && !immediate) return;
      const previousStage = activeStage;
      if (!immediate) beginStageMorph(previousStage, index);
      activeStage = index;
      stages.forEach((stage, i) => { if (stage._dot) stage._dot.classList.toggle("active", i === index); });
      const isIntro = index === 0;
      const isSummary = index === 5;
      panelEl.style.display = (isIntro || isSummary) ? 'none' : 'flex';
      resetBtnEl.classList.toggle('visible', !isIntro);
      updateHud(false);
      stage1.hand.visible = false;
      stage2.pinch.visible = false;
      stage3.fingertips.forEach((s) => s.visible = false);
      stage4.blink.visible = false;
      stage4OverlayEl.classList.toggle("active", index === 4);
      stageTextEl.classList.toggle('is-intro', index === 0);
      stageTextEl.style.display = index === 5 ? 'none' : '';
      archiveLinkEl.classList.remove('visible');
      if (archiveLinkTimer) { clearTimeout(archiveLinkTimer); archiveLinkTimer = null; }
      if (index === 5) {
        stage5.reset();
        archiveLinkTimer = setTimeout(() => {
          if (activeStage === 5) archiveLinkEl.classList.add('visible');
        }, 4400);
      }
      if (immediate) {
        setStageText(index, true);
      } else {
        const transitionStartedAt = stageTransition.startedAt;
        setTimeout(() => {
          if (stageTransition.startedAt !== transitionStartedAt) return;
          setStageText(index, false);
        }, 180);
      }
    }

    const observer = new IntersectionObserver((entries) => {
      let best = null;
      for (const entry of entries) {
        if (!best || entry.intersectionRatio > best.intersectionRatio) best = entry;
      }
      if (!best || best.intersectionRatio < 0.55) return;
      activateStage(Number(best.target.dataset.index));
    }, { root: viewport, threshold: [0.25, 0.55, 0.75] });
    stages.forEach((stage) => observer.observe(stage));

    let scrollStageRaf = 0;
    function syncStageWithScroll() {
      scrollStageRaf = 0;
      const nextIndex = clamp(Math.round(viewport.scrollTop / Math.max(1, height)), 0, stages.length - 1);
      activateStage(nextIndex);
    }
    viewport.addEventListener("scroll", () => {
      if (scrollStageRaf) cancelAnimationFrame(scrollStageRaf);
      scrollStageRaf = requestAnimationFrame(syncStageWithScroll);
    }, { passive: true });

    window.addEventListener("keydown", (event) => {
      const isNextKey = event.key === "ArrowRight" || event.key === ">" || event.key === ".";
      const isPrevKey = event.key === "ArrowLeft" || event.key === "<" || event.key === ",";
      if (!isNextKey && !isPrevKey) return;
      event.preventDefault();
      if (isNextKey) goToStage(activeStage + 1);
      if (isPrevKey) goToStage(activeStage - 1);
    });

    function resize() {
      const prevWidth = width;
      const prevHeight = height;
      width = window.innerWidth;
      height = window.innerHeight;
      sceneCanvas.width = width;
      sceneCanvas.height = height;
      transitionCanvas.width = width;
      transitionCanvas.height = height;
      transitionTargetCanvas.width = width;
      transitionTargetCanvas.height = height;
      previewCanvas.width = previewCanvas.offsetWidth || 160;
      previewCanvas.height = previewCanvas.offsetHeight || 120;
      stage1.resize(prevWidth, prevHeight);
      stage2.resize();
      stage3.resize();
      stage4.resize();
      stage5.resize();
    }

    function clamp(v, min, max) {
      return Math.max(min, Math.min(max, v));
    }

    function pointInRect(point, rect) {
      return point.x >= rect.x && point.x <= rect.x + rect.w && point.y >= rect.y && point.y <= rect.y + rect.h;
    }

    function drawWebcam() {
      if (!videoReady || video.readyState < HTMLMediaElement.HAVE_CURRENT_DATA) return;
      const pw = previewCanvas.width;
      const ph = previewCanvas.height;
      previewCtx.clearRect(0, 0, pw, ph);
      previewCtx.save();
      previewCtx.scale(-1, 1);
      previewCtx.drawImage(video, -pw, 0, pw, ph);
      previewCtx.restore();
    }

    function getScreenPoint(lm, index) {
      return { x: (1 - lm[index].x) * width, y: lm[index].y * height };
    }

    function loadImage(src) {
      const img = new Image();
      img.src = src;
      return img;
    }

    function rasterizeText(label, w, h, fontPx) {
      const off = document.createElement("canvas");
      off.width = w;
      off.height = h;
      const octx = off.getContext("2d");
      octx.fillStyle = "#ffffff";
      octx.font = `300 ${fontPx}px "Helvetica Neue", "SF Pro Display", "Inter", system-ui, sans-serif`;
      octx.textAlign = "center";
      octx.textBaseline = "middle";
      octx.fillText(label, w / 2, h / 2);
      return octx.getImageData(0, 0, w, h).data;
    }

    function createDottedCoin(label, w = 72, opts = {}) {
      const gridSize = opts.gridSize ?? 2;
      const dotSize = opts.dotSize ?? 1;
      const dotColor = opts.dotColor ?? "rgba(240,240,240,0.94)";
      const canvas = document.createElement("canvas");
      canvas.width = w;
      canvas.height = w;
      const ctx = canvas.getContext("2d");
      const cx = w / 2, cy = w / 2;
      const outerR = w * 0.46;
      const innerR = w * 0.34;
      ctx.fillStyle = dotColor;
      for (let y = 0; y < w; y += gridSize) {
        for (let x = 0; x < w; x += gridSize) {
          const dx = x + gridSize / 2 - cx;
          const dy = y + gridSize / 2 - cy;
          const r = Math.hypot(dx, dy);
          if (Math.abs(r - outerR) < gridSize * 0.7 || Math.abs(r - innerR) < gridSize * 0.5) {
            ctx.fillRect(x, y, dotSize, dotSize);
          }
        }
      }
      const data = rasterizeText(label, w, w, Math.round(w * 0.32));
      for (let y = 0; y < w; y += gridSize) {
        for (let x = 0; x < w; x += gridSize) {
          const i = (y * w + x) * 4;
          if (data[i + 3] > 100) ctx.fillRect(x, y, dotSize, dotSize);
        }
      }
      return canvas;
    }

    function sampleCanvasToPoints(canvas, gridSize) {
      const w = canvas.width;
      const h = canvas.height;
      const ctx = canvas.getContext("2d");
      let data;
      try {
        data = ctx.getImageData(0, 0, w, h).data;
      } catch (e) {
        return { points: [], w, h };
      }
      const points = [];
      for (let y = 0; y < h; y += gridSize) {
        for (let x = 0; x < w; x += gridSize) {
          const i = (y * w + x) * 4;
          if (data[i + 3] > 80) points.push({ x, y });
        }
      }
      return { points, w, h };
    }

    const ICON_SIZE = 260;
    const ICON_GRID = 4;
    const ICON_DOT = 2;

    function buildShellIconPoints(gridSize = ICON_GRID) {
      const w = ICON_SIZE, h = ICON_SIZE;
      const off = document.createElement("canvas");
      off.width = w;
      off.height = h;
      const octx = off.getContext("2d");
      octx.strokeStyle = "#ffffff";
      octx.fillStyle = "#ffffff";
      octx.lineWidth = 2.4;
      const cx = w / 2, cy = h * 0.78;
      const r = w * 0.4;
      octx.beginPath();
      octx.arc(cx, cy, r, Math.PI, 2 * Math.PI);
      octx.stroke();
      octx.beginPath();
      octx.moveTo(cx - r, cy);
      octx.bezierCurveTo(cx - r * 0.4, cy + r * 0.16, cx + r * 0.4, cy + r * 0.16, cx + r, cy);
      octx.stroke();
      for (let i = 1; i <= 7; i++) {
        const a = Math.PI + (i / 8) * Math.PI;
        octx.beginPath();
        octx.moveTo(cx, cy);
        octx.lineTo(cx + Math.cos(a) * r * 0.96, cy + Math.sin(a) * r * 0.96);
        octx.stroke();
      }
      for (let ring = 1; ring <= 3; ring++) {
        octx.beginPath();
        octx.arc(cx, cy, r * (0.32 + ring * 0.2), Math.PI, 2 * Math.PI);
        octx.stroke();
      }
      octx.beginPath();
      octx.arc(cx, cy, 4, 0, Math.PI * 2);
      octx.fill();
      return sampleCanvasToPoints(off, gridSize);
    }

    function buildMoneyIconPoints(gridSize = ICON_GRID) {
      const w = ICON_SIZE, h = ICON_SIZE;
      const off = document.createElement("canvas");
      off.width = w;
      off.height = h;
      const octx = off.getContext("2d");
      octx.strokeStyle = "#ffffff";
      octx.fillStyle = "#ffffff";
      octx.lineWidth = 2.4;
      const billW = w * 0.82;
      const billH = h * 0.5;
      const bx = (w - billW) / 2;
      const by = (h - billH) / 2;
      octx.beginPath();
      octx.roundRect(bx, by, billW, billH, 12);
      octx.stroke();
      octx.beginPath();
      octx.roundRect(bx + 14, by + 14, billW - 28, billH - 28, 6);
      octx.stroke();
      octx.font = '300 72px "Helvetica Neue", "SF Pro Display", system-ui, sans-serif';
      octx.textAlign = "center";
      octx.textBaseline = "middle";
      octx.fillText("$", w / 2, h / 2);
      const corners = [
        [bx + 28, by + 28],
        [bx + billW - 28, by + 28],
        [bx + 28, by + billH - 28],
        [bx + billW - 28, by + billH - 28]
      ];
      for (const [ccx, ccy] of corners) {
        octx.beginPath();
        octx.arc(ccx, ccy, 8, 0, Math.PI * 2);
        octx.stroke();
      }
      return sampleCanvasToPoints(off, gridSize);
    }

    function buildNetworkIconPoints(gridSize = ICON_GRID) {
      const w = ICON_SIZE, h = ICON_SIZE;
      const off = document.createElement("canvas");
      off.width = w;
      off.height = h;
      const octx = off.getContext("2d");
      octx.strokeStyle = "#ffffff";
      octx.fillStyle = "#ffffff";
      octx.lineWidth = 2.4;
      const cx = w / 2, cy = h / 2;
      const ringR = w * 0.36;
      const outer = [];
      for (let i = 0; i < 6; i++) {
        const a = (i / 6) * Math.PI * 2 - Math.PI / 2;
        outer.push({ x: cx + Math.cos(a) * ringR, y: cy + Math.sin(a) * ringR });
      }
      for (const n of outer) {
        octx.beginPath();
        octx.moveTo(cx, cy);
        octx.lineTo(n.x, n.y);
        octx.stroke();
      }
      for (let i = 0; i < outer.length; i++) {
        const a = outer[i];
        const b = outer[(i + 1) % outer.length];
        octx.beginPath();
        octx.moveTo(a.x, a.y);
        octx.lineTo(b.x, b.y);
        octx.stroke();
      }
      octx.beginPath();
      octx.arc(cx, cy, 8, 0, Math.PI * 2);
      octx.fill();
      for (const n of outer) {
        octx.beginPath();
        octx.arc(n.x, n.y, 6, 0, Math.PI * 2);
        octx.stroke();
      }
      return sampleCanvasToPoints(off, gridSize);
    }

    function buildComputerIconPoints(gridSize = ICON_GRID) {
      const w = ICON_SIZE, h = ICON_SIZE;
      const off = document.createElement("canvas");
      off.width = w;
      off.height = h;
      const octx = off.getContext("2d");
      octx.strokeStyle = "#ffffff";
      octx.fillStyle = "#ffffff";
      octx.lineWidth = 2.4;
      const monW = w * 0.78;
      const monH = h * 0.46;
      const monX = (w - monW) / 2;
      const monY = h * 0.1;
      octx.beginPath();
      octx.roundRect(monX, monY, monW, monH, 8);
      octx.stroke();
      octx.beginPath();
      octx.roundRect(monX + 12, monY + 12, monW - 24, monH - 24, 4);
      octx.stroke();
      for (let i = 1; i <= 4; i++) {
        const lineY = monY + 18 + i * 18;
        if (lineY > monY + monH - 18) break;
        octx.beginPath();
        octx.moveTo(monX + 24, lineY);
        octx.lineTo(monX + monW - 24 - i * 14, lineY);
        octx.stroke();
      }
      const standTop = monY + monH;
      const standBot = h * 0.74;
      octx.beginPath();
      octx.moveTo(w / 2 - 14, standTop);
      octx.lineTo(w / 2 - 32, standBot);
      octx.lineTo(w / 2 + 32, standBot);
      octx.lineTo(w / 2 + 14, standTop);
      octx.closePath();
      octx.stroke();
      octx.beginPath();
      octx.moveTo(w / 2 - 64, standBot + 4);
      octx.lineTo(w / 2 + 64, standBot + 4);
      octx.lineTo(w / 2 + 54, standBot + 12);
      octx.lineTo(w / 2 - 54, standBot + 12);
      octx.closePath();
      octx.stroke();
      const kbY = standBot + 22;
      octx.beginPath();
      octx.roundRect(w / 2 - 84, kbY, 168, 16, 4);
      octx.stroke();
      for (let i = 0; i < 9; i++) {
        octx.fillRect(w / 2 - 76 + i * 18, kbY + 5, 6, 6);
      }
      return sampleCanvasToPoints(off, gridSize);
    }

    function createDottedBill(label, w = 252, h = 138, opts = {}) {
      const gridSize = opts.gridSize ?? 2;
      const dotSize = opts.dotSize ?? 1;
      const dotColor = opts.dotColor ?? "rgba(240,240,240,0.94)";
      const canvas = document.createElement("canvas");
      canvas.width = w;
      canvas.height = h;
      const ctx = canvas.getContext("2d");
      ctx.fillStyle = dotColor;

      const insetA = gridSize * 2;
      const insetB = gridSize * 5;

      for (let x = insetA; x <= w - insetA - gridSize; x += gridSize) {
        ctx.fillRect(x, insetA, dotSize, dotSize);
        ctx.fillRect(x, h - insetA - gridSize, dotSize, dotSize);
      }
      for (let y = insetA; y <= h - insetA - gridSize; y += gridSize) {
        ctx.fillRect(insetA, y, dotSize, dotSize);
        ctx.fillRect(w - insetA - gridSize, y, dotSize, dotSize);
      }
      for (let x = insetB; x <= w - insetB - gridSize; x += gridSize * 2) {
        ctx.fillRect(x, insetB, dotSize, dotSize);
        ctx.fillRect(x, h - insetB - gridSize, dotSize, dotSize);
      }
      for (let y = insetB; y <= h - insetB - gridSize; y += gridSize * 2) {
        ctx.fillRect(insetB, y, dotSize, dotSize);
        ctx.fillRect(w - insetB - gridSize, y, dotSize, dotSize);
      }

      const corners = [
        [insetA + gridSize * 4, insetA + gridSize * 4],
        [w - insetA - gridSize * 5, insetA + gridSize * 4],
        [insetA + gridSize * 4, h - insetA - gridSize * 5],
        [w - insetA - gridSize * 5, h - insetA - gridSize * 5]
      ];
      for (const [cx, cy] of corners) {
        for (let i = -2; i <= 2; i++) {
          ctx.fillRect(cx + i * gridSize, cy, dotSize, dotSize);
          ctx.fillRect(cx, cy + i * gridSize, dotSize, dotSize);
        }
      }

      const data = rasterizeText(label, w, h, Math.round(h * 0.42));
      for (let y = 0; y < h; y += gridSize) {
        for (let x = 0; x < w; x += gridSize) {
          const i = (y * w + x) * 4;
          if (data[i + 3] > 100) ctx.fillRect(x, y, dotSize, dotSize);
        }
      }
      return canvas;
    }

    const sharedShellSprites = [
      loadImage("./cd%20sub/Shell.svg"),
      loadImage("./cd%20sub/Shell.svg"),
      loadImage("./cd%20sub/Shell.svg")
    ];
    const sharedMoneyAssets = [
      { img: createDottedBill("1000", 252, 138), type: "note", w: 252, h: 138, value: "1000원" },
      { img: createDottedBill("10000", 252, 138), type: "note", w: 252, h: 138, value: "10000원" },
      { img: createDottedBill("50000", 252, 138), type: "note", w: 252, h: 138, value: "50000원" },
      { img: createDottedCoin("100", 72), type: "coin", w: 72, h: 72, value: "100원" },
      { img: createDottedCoin("500", 72), type: "coin", w: 72, h: 72, value: "500원" }
    ];

    const transitionIcons = {
      1: buildShellIconPoints(),
      2: buildMoneyIconPoints(),
      3: buildComputerIconPoints(),
      4: buildNetworkIconPoints()
    };

    const summaryIcons = {
      1: buildShellIconPoints(3),
      2: buildMoneyIconPoints(3),
      3: buildComputerIconPoints(3),
      4: buildNetworkIconPoints(3)
    };

    const stage0 = {
      draw(ctx) {}
    };

    const stage1 = {
      shells: [],
      handTrail: [],
      count: 0,
      gateY: -40,
      suctionY: 420,
      grabRadius: 150,
      targetX: 0,
      targetY: 0,
      hand: { visible: false, fist: false, point: { x: width / 2, y: height / 2 }, velocity: { x: 0, y: 0 }, landmarks: null },
      resize(prevWidth = width, prevHeight = height) {
        this.bounds = { w: width, h: height };
        this.targetX = width / 2;
        this.targetY = 24;
        if (!this.shells.length) {
          this.init();
          return;
        }
        const safePrevWidth = Math.max(prevWidth, 1);
        const safePrevHeight = Math.max(prevHeight, 1);
        for (const shell of this.shells) {
          shell.restX = clamp((shell.restX / safePrevWidth) * width, 80, width - 80);
          shell.x = clamp((shell.x / safePrevWidth) * width, 70, width - 70);
          shell.restY = clamp(height - (safePrevHeight - shell.restY), 80, height - 80);
          shell.y = clamp(height - (safePrevHeight - shell.y), -120, height - 40);
        }
      },
      init() {
        this.shells = [];
        for (let i = 0; i < 28; i++) {
          this.shells.push({
            x: 80 + Math.random() * (width - 160),
            y: height - 140 - Math.random() * 160,
            vx: 0, vy: 0,
            size: 60 + Math.random() * 36,
            img: sharedShellSprites[i % sharedShellSprites.length],
            orbitSeed: Math.random() * Math.PI * 2,
            restX: 80 + Math.random() * (width - 160),
            restY: height - 140 - Math.random() * 160,
            spent: false
          });
        }
      },
      update() {
        const driftNow = performance.now();
        this.handTrail = this.hand.fist
          ? [{ x: this.hand.point.x, y: this.hand.point.y, vx: this.hand.velocity.x, vy: this.hand.velocity.y }, ...this.handTrail].slice(0, 36)
          : this.handTrail.slice(0, Math.max(0, this.handTrail.length - 1));
        for (let i = 0; i < this.shells.length; i++) {
          const shell = this.shells[i];
          if (shell.spent) continue;
          const handDist = Math.hypot(shell.x - this.hand.point.x, shell.y - this.hand.point.y);
          const liftingNow = this.hand.velocity.y < -1.4;
          const activeGrabRadius = liftingNow ? this.grabRadius * 2.1 : this.grabRadius;
          if (this.hand.fist && this.handTrail.length && handDist < activeGrabRadius) {
            const t = this.handTrail[Math.min(this.handTrail.length - 1, 4 + (i % 5) * 2)];
            const angle = shell.orbitSeed + i * 0.52;
            const radius = 58 * (0.5 + (i % 4) * 0.18);
            const target = { x: t.x + Math.cos(angle) * radius, y: t.y + Math.sin(angle) * radius * 0.76 };
            const lifting = liftingNow || t.vy < -1.4;
            const catchStrength = lifting ? 0.012 : 0.0065;
            const velocityBlend = lifting ? 0.009 : 0.006;
            shell.vx += (target.x - shell.x) * catchStrength + t.vx * velocityBlend;
            shell.vy += (target.y - shell.y) * catchStrength + t.vy * velocityBlend;
          } else {
            shell.vx += (shell.restX - shell.x) * 0.0018 + Math.sin((driftNow * 0.0012) + shell.orbitSeed) * 0.008;
            shell.vy += (shell.restY - shell.y) * 0.0024 + Math.cos((driftNow * 0.0014) + shell.orbitSeed) * 0.006;
          }
          if (shell.y < this.suctionY) {
            const pull = Math.pow(1 - clamp(shell.y / this.suctionY, 0, 1), 0.6);
            shell.vy -= 4.2 * pull;
            shell.vx += (this.targetX - shell.x) * 0.032 * pull;
          }
          shell.vx *= 0.9;
          shell.vy *= 0.9;
          shell.x = clamp(shell.x + shell.vx, 70, width - 70);
          shell.y += shell.vy;
          if (shell.y < this.gateY) {
            this.count += 1;
            updateHud();
            shell.spent = true;
          }
          shell.y = clamp(shell.y, -120, height - 40);
        }
      },
      draw(ctx) {
        ctx.save();

        // Pass 1: glow only — drawn in absolute coords, no per-shell save/translate
        if (this.hand.visible && this.hand.fist) {
          const hx = this.hand.point.x, hy = this.hand.point.y;
          const grabR = this.grabRadius * 1.5;
          for (const shell of this.shells) {
            if (shell.spent) continue;
            const dx = shell.x - hx, dy = shell.y - hy;
            const gs = Math.max(0, 1 - (dx * dx + dy * dy) / (grabR * grabR));
            if (gs < 0.04) continue;
            const r = shell.size * 1.1;
            const grad = ctx.createRadialGradient(shell.x, shell.y, 0, shell.x, shell.y, r);
            grad.addColorStop(0, `rgba(255,255,255,${(0.2 * gs).toFixed(2)})`);
            grad.addColorStop(1, 'rgba(255,255,255,0)');
            ctx.fillStyle = grad;
            ctx.beginPath();
            ctx.arc(shell.x, shell.y, r, 0, Math.PI * 2);
            ctx.fill();
          }
        }

        // Pass 2: shell images — no translate needed, direct absolute draw
        ctx.globalAlpha = 0.9;
        for (const shell of this.shells) {
          if (shell.spent) continue;
          ctx.drawImage(shell.img,
            shell.x - shell.size * 0.62,
            shell.y - shell.size * 0.5,
            shell.size * 1.24,
            shell.size);
        }

          });
        });
        stage3.fingertips.forEach((s, key) => { if (!seen.has(key)) { s.visible = false; s.history.length = 0; } });
      }
    });

    const faceMesh = new FaceMesh({ locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/${file}` });
    faceMesh.setOptions({ maxNumFaces: 1, refineLandmarks: true, minDetectionConfidence: 0.5, minTrackingConfidence: 0.5 });
    faceMesh.onResults((results) => {
      if (activeStage !== 4) return;
      const now = performance.now();
      if (!results.multiFaceLandmarks || !results.multiFaceLandmarks.length) {
        stage4.blink.visible = false;
        return;
      }
      const lm = results.multiFaceLandmarks[0];
      const eyeRatio = ([outer, upper, lower, inner]) => {
        const a = lm[outer], b = lm[upper], c = lm[lower], d = lm[inner];
        const horiz = Math.hypot(a.x - d.x, a.y - d.y) || 0.001;
        const vert = Math.hypot(b.x - c.x, b.y - c.y);
        return vert / horiz;
      };
      const left = eyeRatio([33, 159, 145, 133]);
      const right = eyeRatio([362, 386, 374, 263]);
      const ear = (left + right) * 0.5;
      stage4.blink.visible = true;
      const faceRef = lm[1], leftEyeRef = lm[33], rightEyeRef = lm[263];
      stage4.blink.faceCenter = { x: (1 - faceRef.x) * width, y: faceRef.y * height };
      stage4.blink.leftEyeCenter = { x: (1 - leftEyeRef.x) * width, y: leftEyeRef.y * height };
      stage4.blink.rightEyeCenter = { x: (1 - rightEyeRef.x) * width, y: rightEyeRef.y * height };
      if (ear < 0.17 && now > stage4.blink.blinkCooldownUntil) {
        stage4.blink.blinkCooldownUntil = now + 900;
        stage4.fire();
      }
    });

    async function setupCamera() {
      const stream = await navigator.mediaDevices.getUserMedia({ video: { width: 640, height: 480, facingMode: "user" }, audio: false });
      video.srcObject = stream;
      await video.play();
      videoReady = true;
    }

    async function runVision(ts) {
      if (!videoReady || video.readyState < HTMLMediaElement.HAVE_CURRENT_DATA) return;
      if (ts - lastVisionTs < 66) return;
      lastVisionTs = ts;
      if (activeStage === 4) {
        if (faceBusy) return;
        faceBusy = true;
        try { await faceMesh.send({ image: video }); } finally { faceBusy = false; }
      } else if (activeStage > 0) {
        if (handsBusy) return;
        handsBusy = true;
        try { await hands.send({ image: video }); } finally { handsBusy = false; }
      }
    }

    function drawStage(ts) {
      sceneCtx.clearRect(0, 0, width, height);
      if (stageTransition.active) {
        drawStageMorph(sceneCtx, ts);
      } else {
        if (activeStage === 0) stage0.draw(sceneCtx);
        if (activeStage === 1) stage1.draw(sceneCtx);
        if (activeStage === 2) stage2.draw(sceneCtx);
        if (activeStage === 3) stage3.draw(sceneCtx);
        if (activeStage === 4) stage4.draw(sceneCtx);
        if (activeStage === 5) stage5.draw(sceneCtx);
      }

      // 공통 카운팅 영역 — 정중앙 원형 그라디언트, 평소 옅게 + 카운트 시 pulse
      sceneCtx.shadowBlur = 0;
      sceneCtx.globalAlpha = 1;
      sceneCtx.globalCompositeOperation = "source-over";
      hudPulse *= 0.86;
      if (activeStage >= 1 && activeStage <= 4) {
        const cx = width / 2, cy = 0;
        const r = Math.min(width, height) * 0.38;
        const eased = hudPulse * hudPulse;
        const radGrad = sceneCtx.createRadialGradient(cx, cy, 0, cx, cy, r);
        radGrad.addColorStop(0,   `rgba(255,255,255,${(0.05 + eased * 0.24).toFixed(3)})`);
        radGrad.addColorStop(0.5, `rgba(255,255,255,${(0.018 + eased * 0.07).toFixed(3)})`);
        radGrad.addColorStop(1,   'rgba(255,255,255,0)');
        sceneCtx.fillStyle = radGrad;
        sceneCtx.fillRect(0, 0, width, height);
      }
    }

    function tick(ts) {
      tick.last = ts;
      drawWebcam();
      if (activeStage === 1) stage1.update();
      if (activeStage === 2) stage2.update();
      if (activeStage === 3) stage3.update();
      if (activeStage === 4) stage4.update(ts);
      if (activeStage === 5) stage5.update();
      drawStage(ts);
      runVision(ts);
      requestAnimationFrame(tick);
    }

    function resetExperience() {
      stage1.count = 0;
      stage1.shells.length = 0;
      stage1.handTrail.length = 0;
      stage1.init();

      for (const coin of stage2.coins) {
        if (coin.body && coin.body.world) {
          World.remove(stage2.engine.world, coin.body);
        }
      }
      stage2.notes.length = 0;
      stage2.coins.length = 0;
      stage2.particles.length = 0;
      stage2.count = 0;
      stage2.hold.item = null;
      stage2.hold.kind = null;
      stage2.hold.corner = null;
      stage2.resize();

      stage3.total = 0;
      stage3.particles.length = 0;

      stage4.activity = 0;
      stage4.vines.length = 0;
      stage4.sparks.length = 0;
      stage4.costAnimations.length = 0;
      stage4.consensusFlash = 0;
      if (stage4.centerNode) stage4.centerNode.pulse = 0;
      for (const node of stage4.nodes) node.pulse = 0;

      goToStage(0, { immediate: true });
      updateHud(false);
    }

    document.getElementById("reset-btn").addEventListener("click", resetExperience);

    resize();
    goToStage(0, { immediate: true });
    window.addEventListener("resize", resize);

    window.addEventListener("pointermove", (e) => {
      stage5.mouse.x = e.clientX;
      stage5.mouse.y = e.clientY;
    }, { passive: true });
    window.addEventListener("pointerleave", () => {
      stage5.mouse.x = null;
      stage5.mouse.y = null;
    });

    setupCamera()
      .catch(() => {});

    requestAnimationFrame(tick);
  </script>
</body>
</html>
